<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #f5a623;
            --accent-hover: #e09400;
            --text-main: #e8eaf0;
            --text-muted: #8892a4;
            --border: #1e2d45;
            --danger: #ef4444;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--primary);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-logo span {
            border-bottom: 4px solid var(--accent);
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-family: inherit;
        }

        .form-control:focus {
            background: var(--primary);
            border-color: var(--accent);
            color: var(--text-main);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
        }

        .btn-login {
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 2rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 166, 35, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/favicon.svg}" alt="Logo" width="48" height="48">
            Electro<span>Bazar</span>
        </div>

        <div th:if="${error}" class="error-msg">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-4">
                <label for="username" class="form-label">Trabajador</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Nombre de usuario"
                    required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">
                Acceder <i class="bi bi-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        // Apply saved theme mode if any
        (function () {
            const prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.mode === 'light') {
                const r = document.documentElement.style;
                // Simplified light mode for login
                r.setProperty('--primary', '#f6f6f6');
                r.setProperty('--secondary', '#ffffff');
                r.setProperty('--text-main', '#0f172a');
                r.setProperty('--text-muted', '#636b7a');
                r.setProperty('--border', '#cbd5e1');
                document.querySelectorAll('img[alt="Logo"]').forEach(img => img.src = '/favicon-light.svg');
            }
        })();
    </script>
</body>

</html>
