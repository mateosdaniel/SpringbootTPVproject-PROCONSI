<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/login.css}">
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/favicon.svg}" alt="Logo" width="48" height="48">
            Electro<span>Bazar</span>
        </div>

        <div th:if="${error}" class="error-msg">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-4">
                <label for="username" class="form-label">Trabajador</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Nombre de usuario"
                    required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">
                Acceder <i class="bi bi-arrow-right"></i>
            </button>
        </form>
    </div>

    <script th:src="@{/js/common/login.js}"></script>
</body>

</html>
