<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Login - ' + ${companySettings.appName}">Login - ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <link rel="stylesheet" th:href="@{/css/common/login.css}">
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/icons/favicon.svg}" alt="Logo" width="48" height="48">
            <span th:text="${companySettings.appName}">ElectroBazar</span>
        </div>

        <div th:if="${error}" class="error-msg">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="mb-4">
                <label for="username" class="form-label">Trabajador</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Nombre de usuario"
                    required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">
                Acceder <i class="bi bi-arrow-right"></i>
            </button>
            <a href="#" class="forgot-password-link" onclick="showForgotFlow(event)">¿Has olvidado tu contraseña?</a>
        </form>

        <!-- Forgot Password Flow -->
        <div id="forgotFlow" style="display: none;">
            <div id="forgotStep1">
                <p class="text-center mb-4 small text-muted">Introduce tu email y te enviaremos un código de recuperación.</p>
                <div class="mb-4">
                    <label for="resetEmail" class="form-label">Email</label>
                    <input type="email" id="resetEmail" class="form-control" placeholder="ejemplo@correo.com">
                </div>
                <button type="button" class="btn-login" onclick="sendResetPin()">
                    Enviar Código <i class="bi bi-envelope"></i>
                </button>
            </div>

            <div id="forgotStep2" style="display: none;">
                <p class="text-center mb-4 small text-muted">Hemos enviado un código a tu email. Introdúcelo junto a tu nueva contraseña.</p>
                <div class="mb-3">
                    <label for="resetPin" class="form-label">Código (PIN)</label>
                    <input type="text" id="resetPin" class="form-control text-center" placeholder="000000" maxlength="6">
                </div>
                <div class="mb-4">
                    <label for="newPassword" class="form-label">Nueva Contraseña</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••">
                </div>
                <button type="button" class="btn-login" onclick="performReset()">
                    Restablecer Contraseña <i class="bi bi-check2"></i>
                </button>
            </div>
            
            <a href="#" class="forgot-password-link mt-4" onclick="showLoginFlow(event)">Volver al inicio de sesión</a>
        </div>
    </div>

    <script th:src="@{/js/common/login.js}"></script>
</body>

</html>
