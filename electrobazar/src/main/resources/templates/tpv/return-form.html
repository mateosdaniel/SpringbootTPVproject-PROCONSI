<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devolución de Venta — ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            function hexToRgb(hex) {
                let r = 0, g = 0, b = 0;
                if (hex.length === 7) { r = parseInt(hex.slice(1, 3), 16); g = parseInt(hex.slice(3, 5), 16); b = parseInt(hex.slice(5, 7), 16); }
                return r + ", " + g + ", " + b;
            }
            const accentColors = [
                { value: '#ffffff', hover: '#e0e0e0' }, { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' }, { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' }, { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' }, { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#151525', secondary: '#1e1e35', surface: '#252545', border: '#2c2c4d', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#0c0c0c', surface: '#161616', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#121212', secondary: '#1a1a1a', surface: '#242424', border: '#2d2d2d', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { name: 'Blanco Puro', primary: '#ffffff', secondary: '#f8fafc', surface: '#f1f5f9' },
                { name: 'Arena', primary: '#f5edc5', secondary: '#faf3e0', surface: '#f0e6c8' },
                { name: 'Ceniza', primary: '#eef2f7', secondary: '#e4e9f0', surface: '#d8e0ea' },
            ];
            const lightFixed = { border: '#dae1e7', muted: '#64748b', text: '#0f172a' };
            const defaultPrefs = { mode: 'light', lightAccent: 0, lightPrimaryIdx: 0, darkAccent: 7, darkPrimaryIdx: 0 };
            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;
            if (!prefs || prefs.accent !== undefined) { prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' }; localStorage.setItem('tpv-prefs', JSON.stringify(prefs)); }
            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;
            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 7 : 1];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[0];
            let accentValue = accent.value, accentHover = accent.hover;
            if (currentAccentIdx === 0) { accentValue = isDark ? '#ffffff' : '#000000'; accentHover = isDark ? '#e0e0e0' : '#333333'; }
            const rs = document.documentElement.style;
            rs.setProperty('--primary', p.primary); rs.setProperty('--secondary', p.secondary); rs.setProperty('--surface', p.surface);
            if (isDark) { rs.setProperty('--border', p.border); rs.setProperty('--text-muted', p.muted); rs.setProperty('--text-main', p.text); }
            else { rs.setProperty('--border', lightFixed.border); rs.setProperty('--text-muted', lightFixed.muted); rs.setProperty('--text-main', lightFixed.text); }
            rs.setProperty('--accent', accentValue); rs.setProperty('--accent-hover', accentHover); rs.setProperty('--accent-rgb', hexToRgb(accentValue));
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/tpv/tpv-receipt.css}">
    <style>
        .return-form-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .return-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .return-card-header {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .return-card-header i {
            font-size: 1.4rem;
        }

        .return-card-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .return-card-header .ref {
            font-size: 0.82rem;
            opacity: 0.85;
            margin-top: 0.15rem;
        }

        .return-body {
            padding: 1.4rem 1.5rem;
        }

        .return-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 1.2rem 0 0.6rem;
        }

        .return-lines-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .return-lines-table th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.76rem;
            border-bottom: 1px solid var(--border);
            padding: 0.4rem 0.5rem;
        }

        .return-lines-table td {
            padding: 0.55rem 0.5rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .return-lines-table tr:last-child td {
            border-bottom: none;
        }

        .qty-input {
            width: 70px;
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text-main);
            text-align: center;
            font-size: 0.88rem;
        }

        .qty-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.2);
        }

        .muted-text {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .fully-returned {
            opacity: 0.45;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .form-control {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.2);
        }

        .btn-danger {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.4rem;
            border-radius: 8px;
            background: #ef4444;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-cancel {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.2rem;
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
            transition: border-color 0.18s;
        }

        .btn-cancel:hover {
            border-color: var(--accent);
        }

        .btn-row-return {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #ef4444;
            font-size: 0.88rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="page-title"><i class="bi bi-arrow-counterclockwise"></i> Processar Devolución</div>

    <div class="return-form-wrap">

        <!-- Error message -->
        <div th:if="${errorMessage}" class="alert-error">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <div class="return-card">
            <div class="return-card-header">
                <i class="bi bi-arrow-counterclockwise"></i>
                <div>
                    <h2>Devolución — Venta <span th:text="'#' + ${sale.id}">#1</span></h2>
                    <div class="ref">
                        <span th:text="${#temporals.format(sale.createdAt, 'dd/MM/yyyy HH:mm')}">25/02/2026 14:30</span>
                        &mdash; <span th:text="${sale.worker != null ? sale.worker.username : 'Sistema'}">Admin</span>
                        <span th:if="${sale.customer != null}"> &mdash; <span
                                th:text="${sale.customer.name}">Cliente</span></span>
                    </div>
                </div>
            </div>

            <div class="return-body">
                <form id="return-form" th:action="@{/tpv/return}" method="post">
                    <input type="hidden" name="saleId" th:value="${sale.id}">

                    <!-- Lines table -->
                    <p class="return-section-title">Artículos a devolver</p>
                    <table class="return-lines-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio/ud.</th>
                                <th>Vendido</th>
                                <th>Ya devuelto</th>
                                <th>Disponible</th>
                                <th>Devolver</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="line : ${sale.lines}"
                                th:with="returned=${alreadyReturned[line.id]}, available=${line.quantity - alreadyReturned[line.id]}"
                                th:class="${available == 0} ? 'fully-returned' : ''">
                                <td>
                                    <input type="hidden" name="saleLineIds" th:value="${line.id}">
                                    <strong th:text="${line.product.name}">Producto</strong>
                                </td>
                                <td class="muted-text" th:text="${#numbers.formatDecimal(line.unitPrice, 1, 2)} + ' €'">
                                    0.00 €</td>
                                <td th:text="${line.quantity} + ' ud.'">1 ud.</td>
                                <td th:text="${returned} + ' ud.'">0 ud.</td>
                                <td><strong th:text="${available} + ' ud.'">1 ud.</strong></td>
                                <td>
                                    <input type="number" name="quantities" class="qty-input" th:id="'qty-' + ${line.id}"
                                        th:value="0" min="0" th:max="${available}" th:disabled="${available == 0}"
                                        th:attr="data-max=${available}">
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- Reason -->
                    <p class="return-section-title">Motivo</p>
                    <div class="form-group">
                        <textarea id="return-reason" name="reason" class="form-control" rows="3"
                            placeholder="Describe el motivo de la devolución (opcional)..."></textarea>
                    </div>

                    <!-- Refund method -->
                    <p class="return-section-title">Método de devolución</p>
                    <div class="form-group">
                        <select id="return-payment-method" name="paymentMethod" class="form-control">
                            <option value="CASH">Efectivo</option>
                            <option value="CARD">Tarjeta</option>
                        </select>
                    </div>

                    <div class="btn-row-return">
                        <a th:href="@{/tpv/receipt/{id}(id=${sale.id})}" class="btn-cancel">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                        <button type="submit" class="btn-danger" id="submit-return-btn">
                            <i class="bi bi-arrow-counterclockwise"></i> Procesar devolución
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Prevent submitting if all quantities are 0
        document.getElementById('return-form').addEventListener('submit', function (e) {
            const inputs = document.querySelectorAll('input[name="quantities"]:not([disabled])');
            const total = Array.from(inputs).reduce((s, i) => s + parseInt(i.value || 0), 0);
            if (total <= 0) {
                e.preventDefault();
                alert('Selecciona al menos una unidad a devolver.');
            }
        });
    </script>
</body>

</html>
