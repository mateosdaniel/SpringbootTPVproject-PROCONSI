<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierre de Caja - ElectroBazar TPV</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #f5a623;
            --accent-hover: #e09400;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #8892a4;
            --text-main: #e8eaf0;
            --border: #1e2d45;
            --surface: #0f3460;
        }

        body {
            background: var(--primary);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
        }

        .card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 15px;
        }

        .card-header {
            background: var(--surface);
            border-color: var(--border);
        }

        .form-control {
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .form-control:focus {
            background: var(--primary);
            border-color: var(--accent);
            color: var(--text-main);
            box-shadow: 0 0 0 2px rgba(245, 166, 35, 0.2);
        }

        .form-label {
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            color: var(--primary);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            color: var(--primary);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .stat-box {
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .text-danger-custom {
            color: var(--danger);
        }

        .text-success-custom {
            color: var(--success);
        }

        .input-group-text {
            background: var(--secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .card-title {
            color: var(--text-main);
        }
    </style>
</head>

<body class="py-5">
    <div class="container">
        <!-- Header -->
        <div class="mb-4">
            <a href="/tpv" class="btn btn-secondary mb-3">
                <i class="bi bi-arrow-left"></i> Volver al TPV
            </a>
            <h1 class="display-5 fw-bold mb-2 d-flex align-items-center gap-3">
                <img th:src="@{/favicon.svg}" alt="Logo ElectroBazar" width="48" height="48" class="rounded"> Cierre de
                Caja
            </h1>
            <p class="text-muted">Finaliza el día y genera el informe de arqueo</p>
        </div>

        <!-- Resumen del día -->
        <div class="row mb-4 g-3">
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Ventas hoy</div>
                    <div class="stat-value" th:text="${countToday}">0</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Total hoy</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(totalToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Pagos en efectivo</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(cashSalesToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Pagos con tarjeta</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(cardSalesToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
        </div>

        <!-- Formulario de cierre -->
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">
                    <i class="bi bi-clipboard-check"></i> Arqueo de Caja
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/tpv/cash-close}" method="post">
                    <div class="mb-3">
                        <label for="closingBalance" class="form-label">Saldo total contado en caja</label>
                        <div class="input-group">
                            <input type="number" id="closingBalance" name="closingBalance" class="form-control"
                                placeholder="0.00" step="0.01" min="0" required>
                            <span class="input-group-text">€</span>
                        </div>
                        <small class="text-muted">Cantidad total de dinero en físico en la caja</small>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Observaciones</label>
                        <textarea id="notes" name="notes" class="form-control" rows="4"
                            placeholder="Notas sobre el cierre, diferencias, incidencias..."></textarea>
                    </div>

                    <!-- Resumen del diferencial -->
                    <div class="alert alert-info mb-3"
                        style="background: rgba(52,152,219,0.1); border-color: #3498db; color: #3498db;">
                        <small>
                            <strong>Teoría:</strong> <span id="theoryAmount"
                                th:text="${#numbers.formatDecimal(totalToday, 1, 2)} + '€'">0.00€</span><br>
                            <strong>Real:</strong> <span id="realAmount">0.00€</span><br>
                            <strong>Diferencia:</strong> <span id="diffAmount">0.00€</span>
                        </small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Confirmar Cierre de Caja
                        </button>
                        <a href="/tpv" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const theoryAmountText = document.getElementById('theoryAmount').textContent.replace('€', '').trim();
        // El formato español usa punto como separador de miles y coma como decimal (ej: 1.234,56)
        // Primero eliminamos los puntos de miles, luego reemplazamos la coma decimal por punto
        const theoryAmount = parseFloat(theoryAmountText.replace(/\./g, '').replace(',', '.')) || 0;
        const closingBalanceInput = document.getElementById('closingBalance');

        function updateDifference() {
            const realAmount = parseFloat(closingBalanceInput.value.replace(',', '.')) || 0;
            const difference = realAmount - theoryAmount;

            document.getElementById('realAmount').textContent = realAmount.toFixed(2) + '€';
            const diffAmountSpan = document.getElementById('diffAmount');

            // Cambiar color y texto según si hay diferencia
            if (Math.abs(difference) < 0.01) {
                diffAmountSpan.textContent = '0.00€';
                diffAmountSpan.style.color = 'var(--success)';
            } else if (difference > 0) {
                diffAmountSpan.textContent = '+' + difference.toFixed(2) + '€';
                diffAmountSpan.style.color = 'var(--success)';
            } else {
                diffAmountSpan.textContent = difference.toFixed(2) + '€';
                diffAmountSpan.style.color = 'var(--danger)';
            }
        }

        closingBalanceInput.addEventListener('input', updateDifference);
        closingBalanceInput.addEventListener('change', updateDifference);
        closingBalanceInput.addEventListener('keyup', updateDifference);

        // ── Apply saved theme ──
        (function () {
            const accentColors = [
                { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' },
                { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' },
                { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' },
                { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#1a1a2e', secondary: '#16213e', surface: '#0f3460', border: '#1e2d45', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#111111', surface: '#0a0a0a', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#1c1c1c', secondary: '#2a2a2a', surface: '#222222', border: '#3a3a3a', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { primary: '#f6f6f6', secondary: '#ffffff', surface: '#e2e8f0' },
                { primary: '#fbf9f6', secondary: '#fdfdfc', surface: '#e9e7e2' },
                { primary: '#f0f4f8', secondary: '#ffffff', surface: '#dae3ed' },
            ];
            const lightFixed = { border: '#cbd5e1', muted: '#636b7a', text: '#0f172a' };

            const defaultPrefs = {
                mode: 'dark',
                lightAccent: 0, lightPrimaryIdx: 0,
                darkAccent: 6, darkPrimaryIdx: 0
            };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;

            if (!prefs || prefs.accent !== undefined) {
                prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };
            }

            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 6 : 0];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[isDark ? 0 : 1];

            const r = document.documentElement.style;
            r.setProperty('--primary', p.primary);
            r.setProperty('--secondary', p.secondary);
            r.setProperty('--surface', p.surface);
            if (isDark) {
                r.setProperty('--border', p.border);
                r.setProperty('--text-muted', p.muted);
                r.setProperty('--text-main', p.text);
            } else {
                r.setProperty('--border', lightFixed.border);
                r.setProperty('--text-muted', lightFixed.muted);
                r.setProperty('--text-main', lightFixed.text);
            }
            r.setProperty('--accent', accent.value);
            r.setProperty('--accent-hover', accent.hover);

            const logo = isDark ? '/favicon.svg' : '/favicon-light.svg';
            document.querySelectorAll('img[alt="Logo"], img[alt="Logo ElectroBazar"]').forEach(function (i) { i.src = logo; });
            const fl = document.querySelector('link[rel="icon"]'); if (fl) fl.href = logo;
        })();
    </script>
</body>

</html>
