<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierre de Caja - ElectroBazar TPV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #f5a623;
            --accent-hover: #e09400;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #8892a4;
            --border: #1e2d45;
        }
        body {
            background: var(--primary);
            color: #e8eaf0;
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
        }
        .card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 15px;
        }
        .card-header {
            background: rgba(245,166,35,0.12);
            border-color: var(--border);
        }
        .form-control {
            background: var(--primary);
            border: 1px solid var(--border);
            color: #e8eaf0;
        }
        .form-control:focus {
            background: var(--primary);
            border-color: var(--accent);
            color: #e8eaf0;
            box-shadow: 0 0 0 2px rgba(245,166,35,0.2);
        }
        .form-label {
            color: #e8eaf0;
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            color: var(--primary);
            font-weight: 600;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            color: var(--primary);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            color: #e8eaf0;
            border-color: var(--text-muted);
        }
        .stat-box {
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .text-danger-custom {
            color: var(--danger);
        }
        .text-success-custom {
            color: var(--success);
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <!-- Header -->
        <div class="mb-4">
            <a href="/tpv" class="btn btn-secondary mb-3">
                <i class="bi bi-arrow-left"></i> Volver al TPV
            </a>
            <h1 class="display-5 fw-bold mb-2">
                <i class="bi bi-cash-register"></i> Cierre de Caja
            </h1>
            <p class="text-muted">Finaliza el día y genera el informe de arqueo</p>
        </div>

        <!-- Resumen del día -->
        <div class="row mb-4 g-3">
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Ventas hoy</div>
                    <div class="stat-value" th:text="${countToday}">0</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Total hoy</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(totalToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Pagos en efectivo</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(cashSalesToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Pagos con tarjeta</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(cardSalesToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
        </div>

        <!-- Formulario de cierre -->
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">
                    <i class="bi bi-clipboard-check"></i> Arqueo de Caja
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/tpv/cash-close}" method="post">
                    <div class="mb-3">
                        <label for="closingBalance" class="form-label">Saldo total contado en caja</label>
                        <div class="input-group">
                            <input type="number" id="closingBalance" name="closingBalance" class="form-control"
                                   placeholder="0.00" step="0.01" min="0" required>
                            <span class="input-group-text">€</span>
                        </div>
                        <small class="text-muted">Cantidad total de dinero en físico en la caja</small>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Observaciones</label>
                        <textarea id="notes" name="notes" class="form-control" rows="4"
                                  placeholder="Notas sobre el cierre, diferencias, incidencias..."></textarea>
                    </div>

                    <!-- Resumen del diferencial -->
                    <div class="alert alert-info mb-3" style="background: rgba(52,152,219,0.1); border-color: #3498db; color: #3498db;">
                        <small>
                            <strong>Teoría:</strong> <span id="theoryAmount" th:text="${#numbers.formatDecimal(totalToday, 1, 2)} + '€'">0.00€</span><br>
                            <strong>Real:</strong> <span id="realAmount">0.00€</span><br>
                            <strong>Diferencia:</strong> <span id="diffAmount">0.00€</span>
                        </small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Confirmar Cierre de Caja
                        </button>
                        <a href="/tpv" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const theoryAmountText = document.getElementById('theoryAmount').textContent.replace('€', '').trim();
        const theoryAmount = parseFloat(theoryAmountText.replace(',', '.')) || 0;
        const closingBalanceInput = document.getElementById('closingBalance');

        function updateDifference() {
            const realAmount = parseFloat(closingBalanceInput.value.replace(',', '.')) || 0;
            const difference = realAmount - theoryAmount;

            document.getElementById('realAmount').textContent = realAmount.toFixed(2) + '€';
            document.getElementById('diffAmount').textContent = difference.toFixed(2) + '€';

            // Cambiar color según si hay diferencia
            const diffElement = document.getElementById('diffAmount').parentElement;
            if (Math.abs(difference) < 0.01) {
                diffElement.innerHTML = '<strong>Diferencia:</strong> <span style="color: var(--success);">0.00€</span>';
            } else if (difference > 0) {
                diffElement.innerHTML = '<strong>Diferencia:</strong> <span style="color: var(--success);">+' + difference.toFixed(2) + '€</span>';
            } else {
                diffElement.innerHTML = '<strong>Diferencia:</strong> <span style="color: var(--danger);">' + difference.toFixed(2) + '€</span>';
            }
        }

        closingBalanceInput.addEventListener('input', updateDifference);
        closingBalanceInput.addEventListener('change', updateDifference);
        closingBalanceInput.addEventListener('keyup', updateDifference);
    </script>
</body>
</html>
