<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierre de Caja - ElectroBazar TPV</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* Apply theme before render to avoid flash */
    </style>
    <script>
        (function () {
            function hexToRgb(hex) {
                let r = 0, g = 0, b = 0;
                if (hex.length === 7) {
                    r = parseInt(hex.slice(1, 3), 16);
                    g = parseInt(hex.slice(3, 5), 16);
                    b = parseInt(hex.slice(5, 7), 16);
                }
                return r + ", " + g + ", " + b;
            }
            const accentColors = [
                { value: '#ffffff', hover: '#e0e0e0' },
                { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' },
                { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' },
                { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' },
                { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#151525', secondary: '#1e1e35', surface: '#252545', border: '#2c2c4d', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#0c0c0c', surface: '#161616', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#121212', secondary: '#1a1a1a', surface: '#242424', border: '#2d2d2d', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { name: 'Blanco Puro', primary: '#ffffff', secondary: '#f8fafc', surface: '#f1f5f9' },
                { name: 'Arena', primary: '#f5edc5', secondary: '#faf3e0', surface: '#f0e6c8' },
                { name: 'Ceniza', primary: '#eef2f7', secondary: '#e4e9f0', surface: '#d8e0ea' },
            ];
            const lightFixed = { border: '#dae1e7', muted: '#64748b', text: '#0f172a' };
            const defaultPrefs = { mode: 'dark', lightAccent: 1, lightPrimaryIdx: 0, darkAccent: 7, darkPrimaryIdx: 0 };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;
            if (!prefs || prefs.accent !== undefined) {
                prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };
                localStorage.setItem('tpv-prefs', JSON.stringify(prefs));
            }

            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 7 : 1];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[0];

            let accentValue = accent.value;
            let accentHover = accent.hover;
            if (currentAccentIdx === 0) {
                accentValue = isDark ? '#ffffff' : '#000000';
                accentHover = isDark ? '#e0e0e0' : '#333333';
            }

            const rStyles = document.documentElement.style;
            rStyles.setProperty('--primary', p.primary);
            rStyles.setProperty('--secondary', p.secondary);
            rStyles.setProperty('--surface', p.surface);
            if (isDark) {
                rStyles.setProperty('--border', p.border);
                rStyles.setProperty('--text-muted', p.muted);
                rStyles.setProperty('--text-main', p.text);
                rStyles.setProperty('--close-filter', 'invert(1)');
            } else {
                rStyles.setProperty('--border', lightFixed.border);
                rStyles.setProperty('--text-muted', lightFixed.muted);
                rStyles.setProperty('--text-main', lightFixed.text);
                rStyles.setProperty('--close-filter', 'none');
            }

            if (currentAccentIdx === 0) {
                if (isDark && p.primary === '#000000') rStyles.setProperty('--border', '#222222');
                if (!isDark && p.primary === '#ffffff') rStyles.setProperty('--border', '#e0e0e0');
            }

            rStyles.setProperty('--accent', accentValue);
            rStyles.setProperty('--accent-hover', accentHover);
            rStyles.setProperty('--accent-rgb', hexToRgb(accentValue));

            let logoFile = isDark ? '/icons/favicon.svg' : '/icons/favicon-light.svg';
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('img[alt="Logo"], img[alt="Logo ElectroBazar"]').forEach(img => img.src = logoFile);
                const faviconLink = document.querySelector('link[rel="icon"]');
                if (faviconLink) faviconLink.href = logoFile;
            });

            // Live-sync: re-apply theme when preferences change in another tab/window
            window.addEventListener('storage', function (e) {
                if (e.key !== 'tpv-prefs' || !e.newValue) return;
                const p2 = JSON.parse(e.newValue);
                const isDark2 = p2.mode === 'dark';
                let accentIdx2 = isDark2 ? p2.darkAccent : p2.lightAccent;
                if (accentIdx2 >= accentColors.length) accentIdx2 = 0;
                const primaryIdx2 = isDark2 ? p2.darkPrimaryIdx : p2.lightPrimaryIdx;
                const palette2 = isDark2 ? darkP : lightP;
                const pal2 = palette2[primaryIdx2] || palette2[0];
                let accentVal2 = accentColors[accentIdx2] ? accentColors[accentIdx2].value : accentColors[0].value;
                let accentHov2 = accentColors[accentIdx2] ? accentColors[accentIdx2].hover : accentColors[0].hover;
                if (accentIdx2 === 0) {
                    accentVal2 = isDark2 ? '#ffffff' : '#000000';
                    accentHov2 = isDark2 ? '#e0e0e0' : '#333333';
                }
                const rs = document.documentElement.style;
                rs.setProperty('--primary', pal2.primary);
                rs.setProperty('--secondary', pal2.secondary);
                rs.setProperty('--surface', pal2.surface);
                if (isDark2) {
                    rs.setProperty('--border', pal2.border);
                    rs.setProperty('--text-muted', pal2.muted);
                    rs.setProperty('--text-main', pal2.text);
                    rs.setProperty('--close-filter', 'invert(1)');
                } else {
                    rs.setProperty('--border', lightFixed.border);
                    rs.setProperty('--text-muted', lightFixed.muted);
                    rs.setProperty('--text-main', lightFixed.text);
                    rs.setProperty('--close-filter', 'none');
                }
                if (accentIdx2 === 0) {
                    if (isDark2 && pal2.primary === '#000000') rs.setProperty('--border', '#222222');
                    if (!isDark2 && pal2.primary === '#ffffff') rs.setProperty('--border', '#e0e0e0');
                }
                rs.setProperty('--accent', accentVal2);
                rs.setProperty('--accent-hover', accentHov2);
                rs.setProperty('--accent-rgb', hexToRgb(accentVal2));
                const logoFile2 = isDark2 ? '/icons/favicon.svg' : '/icons/favicon-light.svg';
                document.querySelectorAll('img[alt="Logo"], img[alt="Logo ElectroBazar"]').forEach(function (img) { img.src = logoFile2; });
                const faviconLink2 = document.querySelector('link[rel="icon"]');
                if (faviconLink2) faviconLink2.href = logoFile2;
            });
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/tpv/tpv-cash-close.css}">
</head>

<body class="py-5">
    <div class="container">
        <!-- Header -->
        <div class="mb-4">
            <a href="/tpv" class="btn btn-secondary mb-3">
                <i class="bi bi-arrow-left"></i> Volver al TPV
            </a>
            <h1 class="display-5 fw-bold mb-2 d-flex align-items-center gap-3">
                <img th:src="@{/icons/favicon.svg}" alt="Logo ElectroBazar" width="48" height="48" class="rounded">
                Cierre de
                Caja
            </h1>
            <p class="text-muted">Finaliza el día y genera el informe de arqueo</p>
        </div>

        <!-- Resumen del día -->
        <div class="row mb-4 g-3">
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Ventas hoy</div>
                    <div class="stat-value" th:text="${countToday}">0</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Total hoy</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(totalToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Pagos en efectivo</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(cashSalesToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-box">
                    <div class="stat-label">Pagos con tarjeta</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(cardSalesToday, 1, 2)} + '€'">0.00€</div>
                </div>
            </div>
        </div>

        <!-- Formulario de cierre -->
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">
                    <i class="bi bi-clipboard-check"></i> Arqueo de Caja
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/tpv/cash-close}" method="post">
                    <div class="mb-3">
                        <label for="closingBalance" class="form-label">Saldo total contado en caja</label>
                        <div class="input-group">
                            <input type="number" id="closingBalance" name="closingBalance" class="form-control"
                                placeholder="0.00" step="0.01" min="0" required>
                            <span class="input-group-text">€</span>
                        </div>
                        <small class="text-muted">Cantidad total de dinero en físico en la caja</small>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Observaciones</label>
                        <textarea id="notes" name="notes" class="form-control" rows="4"
                            placeholder="Notas sobre el cierre, diferencias, incidencias..."></textarea>
                    </div>

                    <!-- Resumen del diferencial -->
                    <div class="alert alert-info mb-3"
                        style="background: rgba(52,152,219,0.1); border-color: #3498db; color: #3498db;">
                        <small>
                            <strong>Teoría:</strong> <span id="theoryAmount"
                                th:text="${#numbers.formatDecimal(expectedCashInDrawer, 1, 2)} + '€'">0.00€</span><br>
                            <strong>Real:</strong> <span id="realAmount">0.00€</span><br>
                            <strong>Diferencia:</strong> <span id="diffAmount">0.00€</span>
                        </small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Confirmar Cierre de Caja
                        </button>
                        <a href="/tpv" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/tpv/tpv-cash-close.js}"></script>
</body>

</html>
