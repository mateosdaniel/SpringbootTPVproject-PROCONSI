<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Preferencias - ' + ${companySettings.appName}">Preferencias - ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <link rel="stylesheet" th:href="@{/css/tpv/tpv-preferences.css}">
</head>

<body>
    <!-- Flash overlay for theme transitions -->
    <div class="theme-flash" id="themeFlash"></div>
    <!-- I18n translations for JS -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.prefsI18n = {
            midnight: /*[[#{prefs.background.midnight}]]*/ 'Midnight',
            totalblack: /*[[#{prefs.background.totalblack}]]*/ 'Total Black',
            carbon: /*[[#{prefs.background.carbon}]]*/ 'Carbon',
            purewhite: /*[[#{prefs.background.purewhite}]]*/ 'Pure White',
            sand: /*[[#{prefs.background.sand}]]*/ 'Sand',
            ash: /*[[#{prefs.background.ash}]]*/ 'Ash',
            monochrome: /*[[#{prefs.accent.monochrome}]]*/ 'Monochrome',
            orange: /*[[#{prefs.accent.orange}]]*/ 'Orange',
            blue: /*[[#{prefs.accent.blue}]]*/ 'Blue',
            green: /*[[#{prefs.accent.green}]]*/ 'Green',
            red: /*[[#{prefs.accent.red}]]*/ 'Red',
            purple: /*[[#{prefs.accent.purple}]]*/ 'Purple',
            pink: /*[[#{prefs.accent.pink}]]*/ 'Pink',
            cyan: /*[[#{prefs.accent.cyan}]]*/ 'Cyan',
            custom: /*[[#{prefs.accent.custom}]]*/ 'Custom'
        };
        /*]]>*/
    </script>

    <div class="prefs-container">
        <div class="prefs-top">
            <a href="/tpv" class="btn-back">
                <i class="bi bi-arrow-left"></i> <span th:text="#{prefs.back}">Volver al TPV</span>
            </a>
            <div class="prefs-title"><i class="bi bi-palette2"></i> <span th:text="#{prefs.title}">Preferencias</span></div>
        </div>

        <!-- Idioma -->
        <div class="pref-card">
            <div class="pref-label" th:text="#{prefs.language}">Idioma</div>
            <div class="mode-toggle" id="langToggle">
                <div class="mode-option" data-lang="es" id="langEs">
                    <i class="bi bi-translate"></i> <span th:text="#{prefs.lang.es}">Español</span>
                </div>
                <div class="mode-option" data-lang="en" id="langEn">
                    <i class="bi bi-translate"></i> <span th:text="#{prefs.lang.en}">Inglés</span>
                </div>
            </div>
        </div>

        <!-- Modo oscuro / claro -->
        <div class="pref-card">
            <div class="pref-label" th:text="#{prefs.appearance}">Apariencia</div>
            <div class="mode-toggle" id="modeToggle">
                <div class="mode-option" data-mode="dark" id="modeDark">
                    <i class="bi bi-moon-stars-fill"></i> <span th:text="#{prefs.appearance.dark}">Oscuro</span>
                </div>
                <div class="mode-option" data-mode="light" id="modeLight">
                    <i class="bi bi-sun-fill"></i> <span th:text="#{prefs.appearance.light}">Claro</span>
                </div>
            </div>
        </div>

        <!-- Tamaño de letra -->
        <div class="pref-card">
            <div class="pref-label" th:text="#{prefs.font.size}">Tamaño de letra</div>
            <div class="option-selector" id="sizeSelector">
                <div class="select-option size-small" data-size="14px" th:text="#{prefs.font.size.small}">Pequeño</div>
                <div class="select-option size-normal" data-size="16px" th:text="#{prefs.font.size.normal}">Normal</div>
                <div class="select-option size-large" data-size="18px" th:text="#{prefs.font.size.large}">Grande</div>
                <div class="select-option size-xl" data-size="20px" th:text="#{prefs.font.size.extra}">Extra</div>
            </div>
        </div>

        <!-- Tipo de letra -->
        <div class="pref-card">
            <div class="pref-label" th:text="#{prefs.font.family}">Tipo de letra</div>
            <div class="option-selector" id="fontSelector">
                <div class="select-option font-barlow" data-font="'Barlow', sans-serif" th:text="#{prefs.font.family.barlow}">Barlow</div>
                <div class="select-option font-montserrat" data-font="'Montserrat', sans-serif" th:text="#{prefs.font.family.modern}">Moderno</div>
                <div class="select-option font-playfair" data-font="'Playfair Display', serif" th:text="#{prefs.font.family.classic}">Clásico</div>
                <div class="select-option font-quicksand" data-font="'Quicksand', sans-serif" th:text="#{prefs.font.family.rounded}">Rounded</div>
            </div>
        </div>

        <!-- Color de acento -->
        <div class="pref-card">
            <div class="pref-label" th:text="#{prefs.accent.color}">Color de acento</div>
            <div class="swatch-grid" id="accentSwatches"></div>
            <!-- Hidden input that will be triggered by a special swatch -->
            <input type="color" id="customAccentPicker" style="visibility: hidden; position: absolute; width: 0; height: 0;">
        </div>

        <!-- Tono de fondo -->
        <div class="pref-card">
            <div class="pref-label" th:text="#{prefs.background.tone}">Tono de fondo</div>
            <div class="primary-list" id="primarySwatches"></div>
        </div>
    </div>

    <script th:src="@{/js/tpv/tpv-preferences.js(v='1.1')}"></script>
</body>

</html>
