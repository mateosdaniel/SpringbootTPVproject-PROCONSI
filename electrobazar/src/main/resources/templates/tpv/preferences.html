<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferencias - ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #f5a623;
            --accent-hover: #e09400;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #8892a4;
            --text-main: #e8eaf0;
            --border: #1e2d45;
        }

        * {
            box-sizing: border-box;
        }

        body,
        .pref-card,
        .mode-option,
        .btn-back,
        .prefs-title {
            transition: background-color 0.4s ease, color 0.3s ease, border-color 0.4s ease;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--primary);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .prefs-container {
            max-width: 520px;
            margin: 0 auto;
        }

        /* ── Header ── */
        .prefs-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            font-family: inherit;
            font-size: 0.88rem;
        }

        .btn-back:hover {
            border-color: var(--accent);
            color: var(--text-main);
        }

        .prefs-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .prefs-title i {
            color: var(--accent);
        }

        /* ── Cards ── */
        .pref-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .pref-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* ── Mode Toggle ── */
        .mode-toggle {
            display: flex;
            background: var(--primary);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            cursor: pointer;
            position: relative;
        }

        .mode-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
            user-select: none;
        }

        .mode-option i {
            font-size: 1.1rem;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mode-option.active {
            background: var(--accent);
            color: var(--primary);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        }

        .mode-option.active i {
            transform: rotate(360deg);
        }

        .mode-option:not(.active):hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ── Color Swatches ── */
        .swatch-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .swatch {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            border: 2.5px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.25s ease,
                box-shadow 0.25s ease;
        }

        .swatch:hover {
            transform: scale(1.18);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .swatch:active {
            transform: scale(0.95);
        }

        .swatch.selected {
            border-color: var(--text-main);
            box-shadow: 0 0 0 2px var(--primary), 0 0 0 4px var(--text-main);
        }

        .swatch.selected::after {
            content: '\F26E';
            font-family: 'bootstrap-icons';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            animation: checkPop 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .swatch-name {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .swatch-wrapper {
            position: relative;
            display: inline-block;
        }

        .swatch-wrapper:hover .swatch-name {
            opacity: 1;
        }

        /* ── Primary tone swatches ── */
        .primary-swatch {
            width: 100%;
            height: 52px;
            border-radius: 10px;
            cursor: pointer;
            border: 2.5px solid transparent;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 0.75rem;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.25s ease,
                box-shadow 0.25s ease;
            position: relative;
        }

        .primary-swatch:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        }

        .primary-swatch:active {
            transform: scale(0.99);
        }

        .primary-swatch.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--primary), 0 0 0 4px var(--accent);
        }

        .primary-swatch .preview-dot {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .primary-swatch .preview-label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .primary-swatch.selected::after {
            content: '\F26E';
            font-family: 'bootstrap-icons';
            position: absolute;
            right: 1rem;
            color: var(--accent);
            font-size: 1rem;
            animation: checkPop 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .primary-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ── Animations ── */
        @keyframes checkPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pref-card {
            animation: fadeSlideIn 0.4s ease both;
        }

        .pref-card:nth-child(2) {
            animation-delay: 0.08s;
        }

        .pref-card:nth-child(3) {
            animation-delay: 0.16s;
        }

        /* Theme transition flash */
        .theme-flash {
            position: fixed;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .theme-flash.active {
            opacity: 0.08;
        }
    </style>
</head>

<body>
    <!-- Flash overlay for theme transitions -->
    <div class="theme-flash" id="themeFlash"></div>

    <div class="prefs-container">
        <div class="prefs-top">
            <a href="/tpv" class="btn-back">
                <i class="bi bi-arrow-left"></i> Volver al TPV
            </a>
            <div class="prefs-title"><i class="bi bi-palette2"></i> Preferencias</div>
        </div>

        <!-- Modo oscuro / claro -->
        <div class="pref-card">
            <div class="pref-label">Apariencia</div>
            <div class="mode-toggle" id="modeToggle">
                <div class="mode-option" data-mode="dark" id="modeDark">
                    <i class="bi bi-moon-stars-fill"></i> Oscuro
                </div>
                <div class="mode-option" data-mode="light" id="modeLight">
                    <i class="bi bi-sun-fill"></i> Claro
                </div>
            </div>
        </div>

        <!-- Color de acento -->
        <div class="pref-card">
            <div class="pref-label">Color de acento</div>
            <div class="swatch-grid" id="accentSwatches"></div>
        </div>

        <!-- Tono de fondo -->
        <div class="pref-card">
            <div class="pref-label">Tono de fondo</div>
            <div class="primary-list" id="primarySwatches"></div>
        </div>
    </div>

    <script>
        (function () {
            // ── Color Palettes ──
            const accentColors = [
                { name: 'Naranja', value: '#f5a623', hover: '#e09400' },
                { name: 'Azul', value: '#3b82f6', hover: '#2563eb' },
                { name: 'Verde', value: '#22c55e', hover: '#16a34a' },
                { name: 'Rojo', value: '#ef4444', hover: '#dc2626' },
                { name: 'Violeta', value: '#a855f7', hover: '#9333ea' },
                { name: 'Rosa', value: '#ec4899', hover: '#db2777' },
                { name: 'Cian', value: '#06b6d4', hover: '#0891b2' }
            ];

            const darkPrimaries = [
                { name: 'Medianoche', primary: '#1a1a2e', secondary: '#16213e', surface: '#0f3460', border: '#1e2d45', muted: '#8892a4', text: '#e8eaf0' },
                { name: 'Negro total', primary: '#000000', secondary: '#111111', surface: '#0a0a0a', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { name: 'Carbón', primary: '#1c1c1c', secondary: '#2a2a2a', surface: '#222222', border: '#3a3a3a', muted: '#888888', text: '#e8e8e8' },
            ];

            const lightPrimaries = [
                { name: 'Blanco total', primary: '#f6f6f6', secondary: '#ffffff', surface: '#e2e8f0' },
                { name: 'Blanco hueso', primary: '#fbf9f6', secondary: '#fdfdfc', surface: '#e9e7e2' },
                { name: 'Gris perla', primary: '#f0f4f8', secondary: '#ffffff', surface: '#dae3ed' },
            ];

            const lightFixed = {
                border: '#cbd5e1',
                muted: '#636b7a',
                text: '#0f172a'
            };

            // ── State ──
            const defaultPrefs = {
                mode: 'dark',
                lightAccent: 0, lightPrimaryIdx: 0,
                darkAccent: 6, darkPrimaryIdx: 0
            };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            // If the user's previously saved index is now out of bounds due to array shrinkage, reset to 0
            if (prefs && prefs.darkPrimaryIdx >= darkPrimaries.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightPrimaries.length) prefs.lightPrimaryIdx = 0;

            if (!prefs || prefs.accent !== undefined) {
                // Initialize or migrate from old
                prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };
            }
            // Migrate off out-of-bounds accents
            if (prefs.darkAccent >= accentColors.length) prefs.darkAccent = 0;
            if (prefs.lightAccent >= accentColors.length) prefs.lightAccent = 0;

            const flash = document.getElementById('themeFlash');

            function triggerFlash() {
                flash.classList.add('active');
                setTimeout(() => flash.classList.remove('active'), 400);
            }

            // ── Apply Theme ──
            function apply(animate) {
                const isDark = prefs.mode === 'dark';

                let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
                if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;

                const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

                const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 6 : 0];
                const palette = isDark ? darkPrimaries : lightPrimaries;
                const p = palette[currentPrimaryIdx] || palette[isDark ? 0 : 1];
                const root = document.documentElement.style;

                root.setProperty('--primary', p.primary);
                root.setProperty('--secondary', p.secondary);
                root.setProperty('--surface', p.surface);
                if (isDark) {
                    root.setProperty('--border', p.border);
                    root.setProperty('--text-muted', p.muted);
                    root.setProperty('--text-main', p.text);
                } else {
                    root.setProperty('--border', lightFixed.border);
                    root.setProperty('--text-muted', lightFixed.muted);
                    root.setProperty('--text-main', lightFixed.text);
                }
                root.setProperty('--accent', accent.value);
                root.setProperty('--accent-hover', accent.hover);

                // Swap logo images
                const logoFile = isDark ? '/favicon.svg' : '/favicon-light.svg';
                document.querySelectorAll('img[alt="Logo"]').forEach(img => img.src = logoFile);
                const faviconLink = document.querySelector('link[rel="icon"]');
                if (faviconLink) faviconLink.href = logoFile;

                // Mode buttons
                document.getElementById('modeDark').classList.toggle('active', isDark);
                document.getElementById('modeLight').classList.toggle('active', !isDark);

                localStorage.setItem('tpv-prefs', JSON.stringify(prefs));

                if (animate) triggerFlash();

                renderSwatches();
            }

            // ── Render Accent Swatches ──
            function renderSwatches() {
                const accentGrid = document.getElementById('accentSwatches');
                accentGrid.innerHTML = '';
                const isDark = prefs.mode === 'dark';
                const currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;

                accentColors.forEach((c, i) => {

                    const wrapper = document.createElement('div');
                    wrapper.className = 'swatch-wrapper';

                    const el = document.createElement('div');
                    el.className = 'swatch' + (currentAccentIdx === i ? ' selected' : '');
                    el.style.background = c.value;
                    el.title = c.name;
                    el.addEventListener('click', () => {
                        if (isDark) prefs.darkAccent = i; else prefs.lightAccent = i;
                        apply(true);
                    });

                    const label = document.createElement('span');
                    label.className = 'swatch-name';
                    label.textContent = c.name;

                    wrapper.appendChild(el);
                    wrapper.appendChild(label);
                    accentGrid.appendChild(wrapper);
                });

                // Primary tones
                const palette = isDark ? darkPrimaries : lightPrimaries;
                const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;
                const primaryGrid = document.getElementById('primarySwatches');
                primaryGrid.innerHTML = '';
                palette.forEach((p, i) => {
                    const el = document.createElement('div');
                    el.className = 'primary-swatch' + (currentPrimaryIdx === i ? ' selected' : '');
                    el.style.background = p.primary;
                    el.style.borderColor = currentPrimaryIdx === i ? 'var(--accent)' : (p.border || lightFixed.border);

                    const dot = document.createElement('div');
                    dot.className = 'preview-dot';
                    dot.style.background = p.secondary;
                    dot.style.border = '1px solid ' + (p.border || lightFixed.border);

                    const label = document.createElement('span');
                    label.className = 'preview-label';
                    label.style.color = p.text || lightFixed.text;
                    label.textContent = p.name;

                    el.appendChild(dot);
                    el.appendChild(label);
                    el.addEventListener('click', () => {
                        if (isDark) prefs.darkPrimaryIdx = i; else prefs.lightPrimaryIdx = i;
                        apply(true);
                    });
                    primaryGrid.appendChild(el);
                });
            }

            // ── Mode Toggle Events ──
            document.getElementById('modeDark').addEventListener('click', () => {
                if (prefs.mode !== 'dark') {
                    prefs.mode = 'dark';
                    apply(true);
                }
            });

            document.getElementById('modeLight').addEventListener('click', () => {
                if (prefs.mode !== 'light') {
                    prefs.mode = 'light';
                    apply(true);
                }
            });

            // ── Init ──
            apply(false);
        })();
    </script>
</body>

</html>
