<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroBazar TPV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #f5a623;
            --accent-hover: #e09400;
            --surface: #0f3460;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #8892a4;
            --border: #1e2d45;
            --sidebar-width: 200px;
            --ticket-width: 320px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--primary);
            color: #e8eaf0;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* ── HEADER ── */
        .tpv-header {
            background: var(--secondary);
            border-bottom: 2px solid var(--accent);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }

        .tpv-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .tpv-logo span { color: #e8eaf0; }

        .header-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .header-stats strong { color: var(--accent); font-size: 1rem; }

        .header-search {
            flex: 1;
            max-width: 360px;
        }

        .header-search .form-control {
            background: var(--primary);
            border: 1px solid var(--border);
            color: #e8eaf0;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .header-search .form-control:focus {
            background: var(--primary);
            border-color: var(--accent);
            color: #e8eaf0;
            box-shadow: 0 0 0 2px rgba(245,166,35,0.2);
        }

        .header-search .form-control::placeholder { color: var(--text-muted); }

        .btn-search {
            background: var(--accent);
            border: none;
            color: var(--primary);
            font-weight: 600;
            border-radius: 8px;
            padding: 0.375rem 0.9rem;
        }

        .btn-search:hover { background: var(--accent-hover); color: var(--primary); }

        /* ── LAYOUT ── */
        .tpv-body {
            display: flex;
            margin-top: 56px;
            height: calc(100vh - 56px);
        }

        /* ── SIDEBAR CATEGORÍAS ── */
        .tpv-sidebar {
            width: var(--sidebar-width);
            background: var(--secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            flex-shrink: 0;
            padding: 0.75rem 0;
        }

        .sidebar-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 0.5rem 1rem 0.75rem;
        }

        .cat-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem 1rem;
            border: none;
            background: transparent;
            color: #c5cad6;
            font-family: 'Barlow', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            text-decoration: none;
        }

        .cat-btn:hover {
            background: rgba(245,166,35,0.08);
            color: #e8eaf0;
            border-left-color: rgba(245,166,35,0.4);
        }

        .cat-btn.active {
            background: rgba(245,166,35,0.12);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        /* ── GRID PRODUCTOS ── */
        .tpv-products {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: var(--primary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.75rem;
        }

        .product-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .product-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245,166,35,0.06);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .product-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .product-card:hover::after { opacity: 1; }

        .product-card:active { transform: translateY(0); }

        .product-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--text-muted);
        }

        .product-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: #e8eaf0;
            margin-bottom: 0.35rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        .product-category-badge {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .no-products i { font-size: 3rem; display: block; margin-bottom: 0.75rem; }

        /* ── TICKET ── */
        .tpv-ticket {
            width: var(--ticket-width);
            background: var(--secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .ticket-header {
            padding: 1rem 1.25rem 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ticket-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e8eaf0;
        }

        .ticket-count {
            background: var(--accent);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.15rem 0.55rem;
        }

        .ticket-lines {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .ticket-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 0.88rem;
            gap: 0.5rem;
        }

        .ticket-empty i { font-size: 2.5rem; }

        .ticket-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.4rem;
            border-radius: 8px;
            margin-bottom: 0.35rem;
            transition: background 0.1s;
        }

        .ticket-line:hover { background: rgba(255,255,255,0.04); }

        .ticket-line-name {
            flex: 1;
            font-size: 0.83rem;
            font-weight: 500;
            color: #e8eaf0;
            line-height: 1.3;
        }

        .ticket-line-price {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .qty-btn {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: #e8eaf0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            line-height: 1;
            padding: 0;
        }

        .qty-btn:hover { border-color: var(--accent); color: var(--accent); }

        .qty-num {
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
            color: #e8eaf0;
        }

        .btn-remove-line {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 0.9rem;
            transition: color 0.1s;
        }

        .btn-remove-line:hover { color: var(--danger); }

        /* ── TICKET FOOTER ── */
        .ticket-footer {
            border-top: 1px solid var(--border);
            padding: 1rem 1.25rem;
        }

        .ticket-total-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
        }

        .ticket-total-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .ticket-total-amount {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .payment-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pay-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--primary);
            color: var(--text-muted);
            font-family: 'Barlow', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .pay-btn:hover { border-color: var(--accent); color: #e8eaf0; }

        .pay-btn.selected {
            border-color: var(--accent);
            background: rgba(245,166,35,0.12);
            color: var(--accent);
        }

        .btn-cobrar {
            width: 100%;
            padding: 0.85rem;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: var(--primary);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .btn-cobrar:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(245,166,35,0.35);
        }

        .btn-cobrar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-clear {
            width: 100%;
            padding: 0.45rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.15s;
            font-family: 'Barlow', sans-serif;
        }

        .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

        /* ── TOAST ── */
        .toast-container { z-index: 9999; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── ALERT SUCCESS ── */
        .alert-tpv {
            position: fixed;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            min-width: 320px;
            border-radius: 10px;
            background: var(--success);
            color: #fff;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="tpv-header">
    <div class="tpv-logo">Electro<span>Bazar</span></div>

    <!-- Buscador -->
    <form class="header-search d-flex gap-2" th:action="@{/tpv}" method="get">
        <input type="text" name="search" class="form-control"
               placeholder="Buscar producto o código de barras..."
               th:value="${search}" autocomplete="off">
        <button type="submit" class="btn-search">
            <i class="bi bi-search"></i>
        </button>
    </form>

    <!-- Stats del día -->
    <div class="header-stats">
        <div>Ventas hoy <br><strong th:text="${countToday}">0</strong></div>
        <div>Total hoy <br><strong th:text="${#numbers.formatDecimal(totalToday, 1, 2)} + '€'">0.00€</strong></div>
    </div>
</header>

<!-- ── BODY ── -->
<div class="tpv-body">

    <!-- SIDEBAR CATEGORÍAS -->
    <nav class="tpv-sidebar">
        <div class="sidebar-title">Categorías</div>

        <a th:href="@{/tpv}" class="cat-btn"
           th:classappend="${selectedCategoryId == null and search == null} ? 'active' : ''">
            <i class="bi bi-grid-3x3-gap"></i> Todos
        </a>

        <a th:each="cat : ${categories}"
           th:href="@{/tpv(categoryId=${cat.id})}"
           class="cat-btn"
           th:classappend="${selectedCategoryId == cat.id} ? 'active' : ''"
           th:text="${cat.name}">
            Categoría
        </a>
    </nav>

    <!-- GRID DE PRODUCTOS -->
    <main class="tpv-products">

        <!-- Alerta de venta completada -->
        <div th:if="${successMessage}" class="alert-tpv" id="successAlert">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <div class="products-grid">
            <!-- Sin productos -->
            <div th:if="${#lists.isEmpty(products)}" class="no-products">
                <i class="bi bi-box-seam"></i>
                <p>No hay productos disponibles</p>
            </div>

            <!-- Tarjeta de producto -->
            <div th:each="product : ${products}"
                 class="product-card"
                 th:attr="
                    data-id=${product.id},
                    data-name=${product.name},
                    data-price=${product.price},
                    data-category=${product.category != null ? product.category.name : ''}"
                 onclick="addToTicket(this)">

                <i class="bi bi-box product-icon"></i>
                <div class="product-name" th:text="${product.name}">Nombre producto</div>
                <div class="product-price" th:text="${#numbers.formatDecimal(product.price, 1, 2)} + '€'">0.00€</div>
                <div class="product-category-badge"
                     th:text="${product.category != null ? product.category.name : ''}"></div>
            </div>
        </div>
    </main>

    <!-- TICKET -->
    <aside class="tpv-ticket">
        <div class="ticket-header">
            <span class="ticket-title"><i class="bi bi-receipt me-1"></i> Ticket</span>
            <span class="ticket-count" id="ticketCount">0</span>
        </div>

        <div class="ticket-lines" id="ticketLines">
            <div class="ticket-empty" id="ticketEmpty">
                <i class="bi bi-cart"></i>
                <span>Pulsa un producto para añadirlo</span>
            </div>
        </div>

        <div class="ticket-footer">
            <div class="ticket-total-row">
                <span class="ticket-total-label">Total</span>
                <span class="ticket-total-amount" id="ticketTotal">0.00€</span>
            </div>

            <!-- Selector método de pago -->
            <div class="payment-selector">
                <button type="button" class="pay-btn selected" id="btnCash" onclick="selectPayment('CASH')">
                    <i class="bi bi-cash"></i> Efectivo
                </button>
                <button type="button" class="pay-btn" id="btnCard" onclick="selectPayment('CARD')">
                    <i class="bi bi-credit-card"></i> Tarjeta
                </button>
            </div>

            <!-- Formulario oculto que se envía al cobrar -->
            <form id="saleForm" th:action="@{/tpv/sale}" method="post">
                <input type="hidden" name="paymentMethod" id="paymentMethodInput" value="CASH">
                <div id="formLines"></div>
                <button type="button" class="btn-cobrar" id="btnCobrar"
                        onclick="submitSale()" disabled>
                    <i class="bi bi-lightning-fill me-1"></i> Cobrar
                </button>
            </form>

            <button type="button" class="btn-clear" onclick="clearTicket()">
                <i class="bi bi-trash me-1"></i> Vaciar ticket
            </button>
        </div>
    </aside>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Estado del ticket ──
    const ticket = {}; // { productId: { name, price, quantity } }

    function addToTicket(card) {
        const id    = card.dataset.id;
        const name  = card.dataset.name;
        const price = parseFloat(card.dataset.price);

        if (ticket[id]) {
            ticket[id].quantity++;
        } else {
            ticket[id] = { name, price, quantity: 1 };
        }
        renderTicket();

        // Feedback visual en la tarjeta
        card.style.borderColor = 'var(--success)';
        setTimeout(() => card.style.borderColor = '', 300);
    }

    function changeQty(id, delta) {
        if (!ticket[id]) return;
        ticket[id].quantity += delta;
        if (ticket[id].quantity <= 0) delete ticket[id];
        renderTicket();
    }

    function removeLine(id) {
        delete ticket[id];
        renderTicket();
    }

    function clearTicket() {
        Object.keys(ticket).forEach(k => delete ticket[k]);
        renderTicket();
    }

    function renderTicket() {
        const linesEl   = document.getElementById('ticketLines');
        const emptyEl   = document.getElementById('ticketEmpty');
        const countEl   = document.getElementById('ticketCount');
        const totalEl   = document.getElementById('ticketTotal');
        const cobrarBtn = document.getElementById('btnCobrar');
        const formLines = document.getElementById('formLines');

        const ids = Object.keys(ticket);

        // Vacío
        if (ids.length === 0) {
            linesEl.innerHTML = '';
            linesEl.appendChild(emptyEl);
            emptyEl.style.display = 'flex';
            countEl.textContent = '0';
            totalEl.textContent = '0.00€';
            cobrarBtn.disabled = true;
            formLines.innerHTML = '';
            return;
        }

        emptyEl.style.display = 'none';

        let totalItems = 0;
        let totalAmount = 0;
        let linesHTML = '';
        let formHTML = '';

        ids.forEach(id => {
            const item = ticket[id];
            const subtotal = item.price * item.quantity;
            totalItems += item.quantity;
            totalAmount += subtotal;

            linesHTML += `
                <div class="ticket-line">
                    <div class="ticket-line-name">${escapeHtml(item.name)}</div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="changeQty('${id}', -1)">−</button>
                        <span class="qty-num">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                    </div>
                    <div class="ticket-line-price">${subtotal.toFixed(2)}€</div>
                    <button class="btn-remove-line" onclick="removeLine('${id}')">
                        <i class="bi bi-x"></i>
                    </button>
                </div>`;

            formHTML += `
                <input type="hidden" name="productIds" value="${id}">
                <input type="hidden" name="quantities" value="${item.quantity}">`;
        });

        linesEl.innerHTML = linesHTML;
        formLines.innerHTML = formHTML;
        countEl.textContent = totalItems;
        totalEl.textContent = totalAmount.toFixed(2) + '€';
        cobrarBtn.disabled = false;
    }

    function selectPayment(method) {
        document.getElementById('paymentMethodInput').value = method;
        document.getElementById('btnCash').classList.toggle('selected', method === 'CASH');
        document.getElementById('btnCard').classList.toggle('selected', method === 'CARD');
    }

    function submitSale() {
        if (Object.keys(ticket).length === 0) return;
        document.getElementById('saleForm').submit();
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Auto-ocultar alerta de éxito tras 4 segundos
    const alert = document.getElementById('successAlert');
    if (alert) setTimeout(() => alert.style.display = 'none', 4000);
</script>
</body>
</html>
