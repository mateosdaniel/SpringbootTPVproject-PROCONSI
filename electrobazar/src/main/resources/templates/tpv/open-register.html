<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apertura de Caja - ElectroBazar TPV</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script>
        (function () {
            const accentColors = [
                { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' },
                { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' },
                { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' },
                { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#1a1a2e', secondary: '#16213e', surface: '#0f3460', border: '#1e2d45', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#111111', surface: '#0a0a0a', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#1c1c1c', secondary: '#2a2a2a', surface: '#222222', border: '#3a3a3a', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { primary: '#f6f6f6', secondary: '#ffffff', surface: '#e2e8f0' },
                { primary: '#fbf9f6', secondary: '#fdfdfc', surface: '#e9e7e2' },
                { primary: '#f0f4f8', secondary: '#ffffff', surface: '#dae3ed' },
            ];
            const lightFixed = { border: '#cbd5e1', muted: '#636b7a', text: '#0f172a' };
            const defaultPrefs = { mode: 'dark', lightAccent: 0, lightPrimaryIdx: 0, darkAccent: 6, darkPrimaryIdx: 0 };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;
            if (!prefs || prefs.accent !== undefined) prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };

            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 6 : 0];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[isDark ? 0 : 1];

            const r = document.documentElement.style;
            r.setProperty('--primary', p.primary);
            r.setProperty('--secondary', p.secondary);
            r.setProperty('--surface', p.surface);
            if (isDark) {
                r.setProperty('--border', p.border);
                r.setProperty('--text-muted', p.muted);
                r.setProperty('--text-main', p.text);
            } else {
                r.setProperty('--border', lightFixed.border);
                r.setProperty('--text-muted', lightFixed.muted);
                r.setProperty('--text-main', lightFixed.text);
            }
            r.setProperty('--accent', accent.value);
            r.setProperty('--accent-hover', accent.hover);

            const logoFile = isDark ? '/icons/favicon.svg' : '/icons/favicon-light.svg';
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('img[alt="Logo ElectroBazar"]').forEach(img => img.src = logoFile);
                const faviconLink = document.querySelector('link[rel="icon"]');
                if (faviconLink) faviconLink.href = logoFile;
            });
        })();
    </script>
    <style>
        body {
            background-color: var(--primary);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        .card {
            background-color: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .card-header,
        .card-footer {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .card-header {
            border-bottom: 1px solid var(--border);
            border-radius: 12px 12px 0 0 !important;
        }

        .form-control,
        .input-group-text {
            background-color: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .form-control:focus {
            background-color: var(--surface);
            color: var(--text-main);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.25rem rgba(var(--accent), 0.25);
        }

        .btn-primary {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--surface);
            color: var(--text-main);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--text-main);
        }
    </style>
</head>

<body class="py-5">
    <div class="container" style="max-width: 600px;">
        <!-- Header -->
        <div class="mb-4 text-center">
            <img th:src="@{/icons/favicon.svg}" alt="Logo ElectroBazar" width="64" height="64" class="mb-3 rounded">
            <h1 class="display-5 fw-bold mb-2">Apertura de Caja</h1>
            <p class="text-muted">Inicia un nuevo turno indicando el saldo base de la caja registradora</p>
        </div>

        <!-- Formulario de apertura -->
        <div class="card shadow-sm">
            <div class="card-header py-3">
                <h5 class="card-title mb-0 d-flex align-items-center gap-2">
                    <i class="bi bi-box-arrow-in-right text-success"></i> Saldo Inicial
                </h5>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/tpv/open-register}" method="post">
                    <div class="mb-4">
                        <label for="openingBalance" class="form-label fw-bold">Saldo de inicio en caja</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-cash-coin"></i></span>
                            <input type="number" id="openingBalance" name="openingBalance" class="form-control"
                                placeholder="0.00" step="0.01" min="0" required autofocus>
                            <span class="input-group-text">€</span>
                        </div>
                        <div class="form-text mt-2">
                            Ingresa la cantidad de dinero en efectivo con la que comienza la caja el día de hoy.
                        </div>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-unlock-fill me-2"></i> Abrir Caja y Empezar a Vender
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/login?logout" class="text-muted text-decoration-none">
                <i class="bi bi-box-arrow-left"></i> Cambiar de usuario o cerrar sesión
            </a>
        </div>
    </div>

</body>

</html>
