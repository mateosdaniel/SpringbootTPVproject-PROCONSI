<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apertura de Caja - ElectroBazar TPV</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <style>
        /* Theme colours are set dynamically by the fragment script */

        html,
        body {
            background-color: var(--primary);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
        }

        .card {
            background-color: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem;
        }

        .card-body {
            background-color: var(--secondary);
        }

        .form-label {
            color: var(--text-main);
            font-weight: 600;
        }

        .form-control,
        .input-group-text {
            background-color: var(--surface) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border) !important;
        }

        .form-control:focus {
            background-color: var(--surface) !important;
            color: var(--text-main) !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 0.25rem rgba(var(--accent-rgb), 0.25) !important;
        }

        .form-control::placeholder {
            color: var(--text-muted) !important;
            opacity: 0.6;
        }

        .form-text {
            color: var(--text-muted) !important;
        }

        .btn-primary {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--primary);
            font-weight: 700;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            color: var(--primary);
        }

        .btn-secondary {
            background-color: var(--surface);
            color: var(--text-main);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .display-5 {
            color: var(--text-main) !important;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .text-accent {
            color: var(--accent) !important;
        }

        .rounded-logo {
            border: 2px solid var(--accent);
            padding: 2px;
            background: var(--surface);
        }

        h1 span {
            color: var(--accent);
        }
    </style>
</head>

<body class="py-5">
    <div class="container" style="max-width: 600px;">
        <!-- Header -->
        <div class="mb-4 text-center">
            <img th:src="@{/icons/favicon.svg}" alt="Logo" width="64" height="64" class="mb-3 rounded-logo shadow-sm">
            <h1 class="display-5 fw-bold mb-2">Electro<span>Bazar</span></h1>
            <p class="text-muted">Apertura de Caja Registradora</p>
        </div>

        <!-- Formulario de apertura -->
        <div class="card shadow-sm">
            <div class="card-header py-3">
                <h5 class="card-title mb-0 d-flex align-items-center gap-2">
                    <i class="bi bi-box-arrow-in-right text-accent"></i> Saldo Inicial
                </h5>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/tpv/open-register}" method="post">
                    <div class="mb-4">
                        <label for="openingBalance" class="form-label fw-bold">Saldo de inicio en caja</label>

                        <!-- Retained balance notice -->
                        <div th:if="${hasSuggestion}" class="alert d-flex align-items-start gap-2 mb-2 py-2 px-3"
                            id="retainNotice"
                            style="background: rgba(var(--accent-rgb),0.12); border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; font-size: .88rem;">
                            <i class="bi bi-piggy-bank-fill flex-shrink-0 mt-1"></i>
                            <span>
                                Se detectó un saldo retenido del turno anterior:
                                <strong th:text="${#numbers.formatDecimal(suggestedOpeningBalance, 1, 2)} + ' €'">0.00
                                    €</strong>.
                                Puedes modificarlo antes de abrir.
                            </span>
                            <button type="button" onclick="document.getElementById('retainNotice').remove();"
                                style="background:none;border:none;margin-left:auto;color:inherit;font-size:1.1rem;line-height:1;cursor:pointer;"
                                aria-label="Cerrar">&times;</button>
                        </div>

                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-cash-coin text-accent"></i></span>
                            <input type="number" id="openingBalance" name="openingBalance" class="form-control"
                                th:value="${hasSuggestion ? suggestedOpeningBalance : null}" placeholder="0.00"
                                step="0.01" min="0" required autofocus>
                            <span class="input-group-text">€</span>
                        </div>
                        <div class="form-text mt-2">
                            Ingresa la cantidad de dinero en efectivo con la que comienza la caja el día de hoy.
                        </div>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-unlock-fill me-2"></i> Abrir Caja y Empezar a Vender
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/login?logout" class="text-muted text-decoration-none">
                <i class="bi bi-box-arrow-left"></i> Cambiar de usuario o cerrar sesión
            </a>
        </div>
    </div>

</body>

</html>
