<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">

    <div class="modal fade" id="customerModal" tabindex="-1" aria-labelledby="customermodalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="customermodalLabel" th:text="#{admin.crm.modal.title}">Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="customerForm" novalidate>
                        <input type="hidden" id="customerId">
                        <div class="mb-3">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="customerTypeRadio"
                                    id="adminTypeIndividual" value="INDIVIDUAL" checked
                                    onchange="toggleAdminCustomerType()">
                                <label class="form-check-label" for="adminTypeIndividual"
                                    th:text="#{admin.crm.type.individual}">Particular</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="customerTypeRadio"
                                    id="adminTypeCompany" value="COMPANY" onchange="toggleAdminCustomerType()">
                                <label class="form-check-label" for="adminTypeCompany"
                                    th:text="#{admin.crm.type.company}">Empresa</label>
                            </div>
                            <input type="hidden" id="customerType" value="INDIVIDUAL">
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" id="lblAdminCustomerName" for="customerName"><span
                                        th:text="#{admin.crm.name_and_surname}">Nombre y
                                        Apellidos</span> <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" id="lblAdminCustomerTaxId" for="customerTaxId"><span
                                        th:text="#{admin.crm.taxId}">NIF/NIE</span>
                                    <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customerTaxId" required placeholder="Ej: 12345678X">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="customerAddress"><span
                                        th:text="#{admin.crm.address}">Dirección (Calle, Número...)</span> <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customerAddress" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label" for="customerCity"><span
                                        th:text="#{admin.common.city}">Población / Ciudiad</span> <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customerCity" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="customerPostalCode"><span
                                        th:text="#{admin.settings.company.postalCode}">Código Postal</span> <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="customerPostalCode" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="customerEmail"
                                    th:text="#{admin.common.email_optional}">Email (Opcional)</label>
                                <input type="email" class="form-control" id="customerEmail" placeholder="ejemplo@correo.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="customerPhone"
                                    th:text="#{admin.common.phone_optional}">Teléfono (Opcional)</label>
                                <input type="text" class="form-control" id="customerPhone" placeholder="+34 600 000 000">
                            </div>
                            <!-- Tariff selector -->
                            <div class="col-12">
                                <label class="form-label" for="customerTariffId">
                                    <i class="bi bi-tags me-1"></i><span th:text="#{admin.common.tariff}">Tarifa de
                                        Precio</span>
                                </label>
                                <select class="form-select" id="customerTariffId">
                                    <option value="" th:text="#{admin.crm.no_tariff}"> Sin tarifa asignadia
                                        (MINORISTA) </option>
                                    <th:block th:each="tariff : ${tariffs}">
                                        <option th:if="${tariff.active}" th:value="${tariff.id}"
                                            th:text="${tariff.getDisplayLabel()}">MINORISTA</option>
                                    </th:block>
                                </select>
                                <small style="color: var(--text-muted);" th:text="#{admin.crm.tariff_info}">La
                                    tarifa define el descuento automático
                                    cuando este cliente se añade a una venta.</small>
                            </div>

                            <div class="col-12" id="adminCustomerReSection" style="display: none;">
                                <div class="p-3 rounded"
                                    style="background:rgba(var(accent-rgb), 0.05); border:1px solid var(--border)">
                                    <div class="form-check form-switch mb-0">
                                        <input class="form-check-input ms-0 me-2" type="checkbox"
                                            id="customerRecargoEquivalencia">
                                        <label class="form-check-label fw-bold" for="customerRecargoEquivalencia">
                                            <i class="bi bi-percent me-1 text-accent"></i>
                                            <span th:text="#{admin.crm.re.label}">Sujeto a Recargo de Equivalencia
                                                (R.E.)</span>
                                        </label>
                                    </div>
                                    <small class="d-block mt-2 ms-4" id="adminCustomerReInfoMsg"
                                        style="font-size: 0.8rem; color: var(--text-muted);"
                                        th:text="#{admin.crm.re.desc}">
                                        Activa esta opción si el cliente es un minorista en régimen de RE. Se
                                        aplicará
                                        el recargo español según el IVA (21%5,2%, etc.).
                                    </small>
                                    <small id="adminCustomerReIncompatibleMsg" class="d-none mt-2 ms-4 fw-bold"
                                        style="font-size: 0.8rem; color: #ef4444;"
                                        th:text="#{admin.crm.re.incompatible}">
                                        El recargo de equivalencia solo aplica a clientes con tarifa minorista
                                    </small>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="customerActive" checked>
                                    <label class="form-check-label" for="customerActive"
                                        th:text="#{admin.crm.active}">Cliente activo</label>
                                </div>
                            </div>
                        </div>
                    </form>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal"
                        th:text="#{common.cancel}">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveCustomer()">
                        <i class="bi bi-check-lg me-1"></i><span th:text="#{common.save}">Guardar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
