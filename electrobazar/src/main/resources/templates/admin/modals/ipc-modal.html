<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">

    <div id="ipcUpdateModal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content"
                style="background-color: #16213e !important; background-color: var(--secondary) !important; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.6); opacity: 1 !important; backdrop-filter: none !important;">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold"><i class="bi bi-graph-up me-2 text-primary"></i><span
                            th:text="#{admin.massiveprices.ipc.modal.title}">Actualización por
                            IPC
                            (INE)</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="ipcApiStatus" class="alert alert-info py-2 d-flex align-items-center gap-2 mb-3">
                        <span class="spinner-border spinner-border-sm"></span>
                        <span th:text="#{admin.massiveprices.ipc.loading}">Obteniendo IPC actual del INE...</span>
                    </div>

                    <div class="row g-4 mt-1">
                        <!-- Settings -->
                        <div class="col-md-5">
                            <h6 class="fw-bold mb-3" th:text="#{admin.dashboard.settings.title}">Configuración</h6>
                            <div class="mb-3">
                                <label class="form-label small" style="color: var(--text-main);"
                                    th:text="#{admin.massiveprices.ipc.variation}">Variación IPC
                                    (%)</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"
                                        style="background-color: var(--surface); border-color: var(--border); color: var(--text-muted);"><i
                                            class="bi bi-percent"></i></span>
                                    <input type="number" step="0.01" class="form-control" id="ipcValueInput"
                                        style="color: var(--text-main); background-color: var(--surface); border-color: var(--border);">
                                </div>
                                <div id="ipcSourceNote" class="form-text mt-1" style="font-size:0.75rem"
                                    th:text="#{admin.massiveprices.ipc.loading_data}">Cargando diato
                                    INE...</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small" style="color: var(--text-main);"
                                    th:text="#{admin.massiveprices.effective_date}">Fecha de
                                    Vigencia</label>
                                <input type="datetime-local" class="form-control" id="ipcEffectivedate"
                                    style="color: var(--text-main); background-color: var(--surface); border-color: var(--border);">
                                <div class="form-text" id="ipcdateNote" style="font-size:0.75rem"
                                    th:text="#{admin.massiveprices.ipc.suggested_date}">Sugerido: 1 de enero
                                    del próximo año
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small" style="color: var(--text-main);"
                                    th:text="#{admin.massiveprices.ipc.scope}">Ámbito de
                                    Aplicación</label>
                                <select class="form-select" id="ipcScope"
                                    style="color: var(--text-main); background-color: var(--surface); border-color: var(--border);">
                                    <option value="all" th:text="#{admin.common.allproducts}">Todos los productos
                                    </option>
                                    <option value="category" th:text="#{admin.massiveprices.ipc.scope.category}">Por
                                        categoria seleccionadia</option>
                                </select>
                            </div>
                        </div>

                        <!-- Preview -->
                        <div class="col-md-7 border-start">
                            <h6 class="fw-bold mb-3 font-medium" th:text="#{admin.common.preview.top5}">Vista Previa
                                (Top 5 Productos)</h6>
                            <div class="table-responsive" style="max-height: 250px;">
                                <table class="table table-sm table-hover align-middle mb-0">
                                    <thead style="background: var(--surface); border-bottom: 2px solid var(--border);">
                                        <tr style="font-size:0.75rem">
                                            <th th:text="#{admin.common.product}">Producto</th>
                                            <th class="text-end" th:text="#{admin.common.current}">Actual</th>
                                            <th class="text-end text-accent" th:text="#{admin.common.new}">Nuevo</th>
                                        </tr>
                                    </thead>
                                    <tbody id="ipcPreviewBody" style="font-size:0.85rem">
                                        <!-- Preview rows inserted via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                        th:text="#{common.cancel}">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnConfirmIpcUpdate" onclick="applyIpcConfirm()">
                        <i class="bi bi-check-lg me-1"></i><span th:text="#{admin.common.confirm_update}">Confirmar
                            Actualización</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
