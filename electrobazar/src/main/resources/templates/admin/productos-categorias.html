<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario — ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        /* Apply theme before render to avoid flash */
    </style>
    <script>
        (function () {
            const accentColors = [
                { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' },
                { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' },
                { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' },
                { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#1a1a2e', secondary: '#16213e', surface: '#0f3460', border: '#1e2d45', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#111111', surface: '#0a0a0a', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#1c1c1c', secondary: '#2a2a2a', surface: '#222222', border: '#3a3a3a', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { primary: '#f6f6f6', secondary: '#ffffff', surface: '#e2e8f0' },
                { primary: '#fbf9f6', secondary: '#fdfdfc', surface: '#e9e7e2' },
                { primary: '#f0f4f8', secondary: '#ffffff', surface: '#dae3ed' },
            ];
            const lightFixed = { border: '#cbd5e1', muted: '#636b7a', text: '#0f172a' };
            const defaultPrefs = { mode: 'dark', lightAccent: 0, lightPrimaryIdx: 0, darkAccent: 6, darkPrimaryIdx: 0 };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;
            if (!prefs || prefs.accent !== undefined) prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };

            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 6 : 0];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[isDark ? 0 : 1];

            const r = document.documentElement.style;
            r.setProperty('--primary', p.primary);
            r.setProperty('--secondary', p.secondary);
            r.setProperty('--surface', p.surface);
            if (isDark) {
                r.setProperty('--border', p.border);
                r.setProperty('--text-muted', p.muted);
                r.setProperty('--text-main', p.text);
            } else {
                r.setProperty('--border', lightFixed.border);
                r.setProperty('--text-muted', lightFixed.muted);
                r.setProperty('--text-main', lightFixed.text);
            }
            r.setProperty('--accent', accent.value);
            r.setProperty('--accent-hover', accent.hover);

            const logoFile = isDark ? '/favicon.svg' : '/favicon-light.svg';
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('img[alt="Logo"]').forEach(img => img.src = logoFile);
                const faviconLink = document.querySelector('link[rel="icon"]');
                if (faviconLink) faviconLink.href = logoFile;
            });
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/admin/admin-productos.css}">
</head>

<body>

    <header class="management-header">
        <a th:href="@{/tpv}" class="m-logo">
            <img th:src="@{/favicon.svg}" alt="Logo" width="32" height="32">
            Electro<span>Bazar</span> <small style="font-size: 0.7rem; opacity: 0.6; margin-left: 0.5rem;">|
                Gestión</small>
        </a>
        <a th:href="@{/tpv}" class="btn-cancel"
            style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <i class="bi bi-arrow-left"></i> Volver al TPV
        </a>
    </header>

    <div class="admin-body">

        <ul class="nav nav-tabs" id="mgmtTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products-pane"
                    type="button">
                    <i class="bi bi-box-seam"></i> Productos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories-pane"
                    type="button">
                    <i class="bi bi-tags"></i> Categorías
                </button>
            </li>
        </ul>

        <div class="tab-content" id="mgmtTabsContent">

            <!-- 1. PRODUCTOS -->
            <div class="tab-pane fade show active" id="products-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <button class="btn-icon me-2" onclick="window.history.back()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        Gestión de Productos
                    </h5>
                    <div class="d-flex gap-2">
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;"
                            onchange="uploadCsvFile(this)">
                        <button class="btn-nuevo" onclick="document.getElementById('csvFileInput').click()"
                            style="background: var(--surface); color: var(--text-main); border: 1px solid var(--border);">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Importar CSV
                        </button>
                        <button class="btn-nuevo" onclick="openProductModal()">
                            <i class="bi bi-plus-lg"></i> Nuevo Producto
                        </button>
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${products}">
                                <td>
                                    <img th:if="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        th:src="${p.imageUrl}" class="thumb">
                                    <div th:unless="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        class="thumb-placeholder"><i class="bi bi-image"></i></div>
                                </td>
                                <td>
                                    <strong th:text="${p.name}"></strong>
                                    <div style="font-size:0.75rem; color:var(--text-muted)"
                                        th:if="${p.description != null}"
                                        th:text="${#strings.abbreviate(p.description,60)}"></div>
                                </td>
                                <td class="fw-bold text-accent" th:text="${#numbers.formatDecimal(p.price,1,2)} + ' €'">
                                </td>
                                <td th:text="${p.stock}"></td>
                                <td>
                                    <span th:if="${p.category != null}" th:text="${p.category.name}"
                                        style="font-size:0.8rem; background:var(--surface); padding:2px 8px; border-radius:5px;"></span>
                                </td>
                                <td>
                                    <span class="badge-active" th:classappend="${p.active} ? 'yes' : 'no'"
                                        th:text="${p.active} ? 'Activo' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${p.id}"
                                            onclick="openProductModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${p.id}" th:data-name="${p.name}"
                                            onclick="deleteProduct(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 2. CATEGORÍAS -->
            <div class="tab-pane fade" id="categories-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <button class="btn-icon me-2" onclick="window.history.back()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        Gestión de Categorías
                    </h5>
                    <button class="btn-nuevo" onclick="openCategoryModal()">
                        <i class="bi bi-plus-lg"></i> Nueva Categoría
                    </button>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${categories}">
                                <td class="fw-bold" th:text="${c.name}"></td>
                                <td th:text="${c.description}"></td>
                                <td>
                                    <span class="badge-active" th:classappend="${c.active} ? 'yes' : 'no'"
                                        th:text="${c.active} ? 'Activa' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${c.id}"
                                            onclick="openCategoryModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${c.id}" th:data-name="${c.name}"
                                            onclick="deleteCategory(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL PRODUCTO ── -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" id="productName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="productDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Precio (€)</label>
                            <input type="number" id="productPrice" class="form-control" step="0.01">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Stock Actual</label>
                            <input type="number" id="productStock" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select id="productCategory" class="form-select">
                            <option value="">Selecciona...</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL de Imagen</label>
                        <input type="text" id="productImageUrl" class="form-control" oninput="previewImage(this.value)">
                        <img id="imgPreview" src="" alt="Vista previa">
                    </div>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" id="productActive">
                        <label class="form-check-label" for="productActive">Producto Activo</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveProduct()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL CATEGORÍA ── -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Categoría</label>
                        <input type="text" id="categoryName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="categoryActive">
                        <label class="form-check-label" for="categoryActive">Categoría Activa</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveCategory()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastMsg" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i id="toastIcon" class="bi"></i>
                    <span id="toastText"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin/admin-productos.js}"></script>

</body>

</html>
