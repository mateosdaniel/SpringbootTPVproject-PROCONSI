<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario — ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        /* Apply theme before render to avoid flash */
    </style>
    <script>
        (function () {
            const accentColors = [
                { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' },
                { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' },
                { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' },
                { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#1a1a2e', secondary: '#16213e', surface: '#0f3460', border: '#1e2d45', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#111111', surface: '#0a0a0a', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#1c1c1c', secondary: '#2a2a2a', surface: '#222222', border: '#3a3a3a', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { primary: '#f6f6f6', secondary: '#ffffff', surface: '#e2e8f0' },
                { primary: '#fbf9f6', secondary: '#fdfdfc', surface: '#e9e7e2' },
                { primary: '#f0f4f8', secondary: '#ffffff', surface: '#dae3ed' },
            ];
            const lightFixed = { border: '#cbd5e1', muted: '#636b7a', text: '#0f172a' };
            const defaultPrefs = { mode: 'dark', lightAccent: 0, lightPrimaryIdx: 0, darkAccent: 6, darkPrimaryIdx: 0 };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;
            if (!prefs || prefs.accent !== undefined) prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };

            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 6 : 0];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[isDark ? 0 : 1];

            const r = document.documentElement.style;
            r.setProperty('--primary', p.primary);
            r.setProperty('--secondary', p.secondary);
            r.setProperty('--surface', p.surface);
            if (isDark) {
                r.setProperty('--border', p.border);
                r.setProperty('--text-muted', p.muted);
                r.setProperty('--text-main', p.text);
            } else {
                r.setProperty('--border', lightFixed.border);
                r.setProperty('--text-muted', lightFixed.muted);
                r.setProperty('--text-main', lightFixed.text);
            }
            r.setProperty('--accent', accent.value);
            r.setProperty('--accent-hover', accent.hover);

            const logoFile = isDark ? '/favicon.svg' : '/favicon-light.svg';
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('img[alt="Logo"]').forEach(img => img.src = logoFile);
                const faviconLink = document.querySelector('link[rel="icon"]');
                if (faviconLink) faviconLink.href = logoFile;
            });
        })();
    </script>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #f5a623;
            --accent-hover: #e09400;
            --surface: #0f3460;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text-muted: #8892a4;
            --text-main: #e8eaf0;
            --border: #1e2d45;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--primary);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .management-header {
            background: var(--secondary);
            border-bottom: 2px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .m-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .m-logo span {
            color: var(--text-main);
        }

        /* ── Body ── */
        .admin-body {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Tabs ── */
        .nav-tabs {
            border-bottom: 2px solid var(--border);
            margin-bottom: 1.5rem;
            gap: 0.5rem;
        }

        .nav-tabs .nav-link {
            color: var(--text-muted);
            border: none;
            border-bottom: 2px solid transparent;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: -2px;
            background: transparent !important;
            transition: all 0.2s;
        }

        .nav-tabs .nav-link:hover {
            color: var(--text-main);
        }

        .nav-tabs .nav-link.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── Table ── */
        .admin-table-wrap {
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: var(--secondary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .admin-table thead tr {
            background: var(--surface);
        }

        .admin-table thead th {
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border: none;
        }

        .admin-table tbody tr {
            border-top: 1px solid var(--border);
            transition: background 0.1s;
        }

        .admin-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge-stock-low {
            background: rgba(231, 76, 60, 0.15);
            color: #ff6b6b;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.7rem;
            border: 1px solid rgba(231, 76, 60, 0.3);
            display: inline-block;
            margin-left: 0.4rem;
        }

        .admin-table tbody td {
            padding: 0.8rem 1rem;
            color: var(--text-main);
            vertical-align: middle;
        }

        .thumb {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .thumb-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .badge-active {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-active.yes {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }

        .badge-active.no {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-icon.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-nuevo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-nuevo:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* ── Modals ── */
        .modal-content {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-main);
        }

        .modal-header {
            border-bottom: 1px solid var(--border);
            padding: 1.25rem;
        }

        .modal-header .modal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .btn-close {
            filter: invert(1) opacity(0.5);
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-control,
        .form-select {
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 10px;
            padding: 0.6rem;
        }

        .form-control:focus,
        .form-select:focus {
            background: var(--primary);
            border-color: var(--accent);
            color: var(--text-main);
            box-shadow: 0 0 0 2px rgba(245, 166, 35, 0.2);
        }

        .btn-save {
            background: var(--accent);
            border: none;
            color: var(--primary);
            font-weight: 700;
            padding: 0.7rem 2rem;
            border-radius: 10px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
        }

        #imgPreview {
            max-width: 100%;
            max-height: 140px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-top: 0.75rem;
            object-fit: cover;
        }

        /* Toast */
        #toastMsg {
            background: var(--secondary);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
        }

        #toastMsg.success {
            border-left: 4px solid var(--success);
        }

        #toastMsg.error {
            border-left: 4px solid var(--danger);
        }
    </style>
</head>

<body>

    <header class="management-header">
        <a th:href="@{/tpv}" class="m-logo">
            <img th:src="@{/favicon.svg}" alt="Logo" width="32" height="32">
            Electro<span>Bazar</span> <small style="font-size: 0.7rem; opacity: 0.6; margin-left: 0.5rem;">|
                Gestión</small>
        </a>
        <a th:href="@{/tpv}" class="btn-cancel"
            style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <i class="bi bi-arrow-left"></i> Volver al TPV
        </a>
    </header>

    <div class="admin-body">

        <ul class="nav nav-tabs" id="mgmtTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products-pane"
                    type="button">
                    <i class="bi bi-box-seam"></i> Productos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories-pane"
                    type="button">
                    <i class="bi bi-tags"></i> Categorías
                </button>
            </li>
        </ul>

        <div class="tab-content" id="mgmtTabsContent">

            <!-- 1. PRODUCTOS -->
            <div class="tab-pane fade show active" id="products-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <button class="btn-icon me-2" onclick="window.history.back()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        Gestión de Productos
                    </h5>
                    <div class="d-flex gap-2">
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;"
                            onchange="uploadCsvFile(this)">
                        <button class="btn-nuevo" onclick="document.getElementById('csvFileInput').click()"
                            style="background: var(--surface); color: var(--text-main); border: 1px solid var(--border); margin-right: 0.5rem;">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Importar CSV
                        </button>
                        <button class="btn-nuevo" onclick="openProductModal()">
                            <i class="bi bi-plus-lg"></i> Nuevo Producto
                        </button>
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${products}">
                                <td>
                                    <img th:if="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        th:src="${p.imageUrl}" class="thumb">
                                    <div th:unless="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        class="thumb-placeholder"><i class="bi bi-image"></i></div>
                                </td>
                                <td>
                                    <strong th:text="${p.name}"></strong>
                                    <div style="font-size:0.75rem; color:var(--text-muted)"
                                        th:if="${p.description != null}"
                                        th:text="${#strings.abbreviate(p.description,60)}"></div>
                                </td>
                                <td class="fw-bold text-accent" th:text="${#numbers.formatDecimal(p.price,1,2)} + ' €'">
                                </td>
                                <td th:text="${p.stock}"></td>
                                <td>
                                    <span th:if="${p.category != null}" th:text="${p.category.name}"
                                        style="font-size:0.8rem; background:var(--surface); padding:2px 8px; border-radius:5px;"></span>
                                </td>
                                <td>
                                    <span class="badge-active" th:classappend="${p.active} ? 'yes' : 'no'"
                                        th:text="${p.active} ? 'Activo' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:onclick="|openProductModal(${p.id})|"><i
                                                class="bi bi-pencil"></i></button>
                                        <button class="btn-icon danger"
                                            th:onclick="|deleteProduct(${p.id}, '${#strings.escapeJavaScript(p.name)}')|"><i
                                                class="bi bi-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 2. CATEGORÍAS -->
            <div class="tab-pane fade" id="categories-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <button class="btn-icon me-2" onclick="window.history.back()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        Gestión de Categorías
                    </h5>
                    <button class="btn-nuevo" onclick="openCategoryModal()">
                        <i class="bi bi-plus-lg"></i> Nueva Categoría
                    </button>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${categories}">
                                <td class="fw-bold" th:text="${c.name}"></td>
                                <td th:text="${c.description}"></td>
                                <td>
                                    <span class="badge-active" th:classappend="${c.active} ? 'yes' : 'no'"
                                        th:text="${c.active} ? 'Activa' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:onclick="|openCategoryModal(${c.id})|"><i
                                                class="bi bi-pencil"></i></button>
                                        <button class="btn-icon danger"
                                            th:onclick="|deleteCategory(${c.id}, '${#strings.escapeJavaScript(c.name)}')|"><i
                                                class="bi bi-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL PRODUCTO ── -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" id="productName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="productDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Precio (€)</label>
                            <input type="number" id="productPrice" class="form-control" step="0.01">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Stock Actual</label>
                            <input type="number" id="productStock" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select id="productCategory" class="form-select">
                            <option value="">Selecciona...</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL de Imagen</label>
                        <input type="text" id="productImageUrl" class="form-control" oninput="previewImage(this.value)">
                        <img id="imgPreview" src="" alt="Vista previa">
                    </div>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" id="productActive">
                        <label class="form-check-label" for="productActive">Producto Activo</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveProduct()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL CATEGORÍA ── -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Categoría</label>
                        <input type="text" id="categoryName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="categoryActive">
                        <label class="form-check-label" for="categoryActive">Categoría Activa</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveCategory()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastMsg" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i id="toastIcon" class="bi"></i>
                    <span id="toastText"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const productModal = new bootstrap.Modal(document.getElementById('productModal'));
        const categoryModal = new bootstrap.Modal(document.getElementById('categoryModal'));

        function showToast(msg, type = 'success') {
            const el = document.getElementById('toastMsg');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastText');
            el.classList.remove('success', 'error');
            el.classList.add(type);
            icon.className = 'bi fs-5 ' + (type === 'success' ? 'bi-check-circle text-success' : 'bi-exclamation-circle text-danger');
            text.textContent = msg;
            bootstrap.Toast.getOrCreateInstance(el).show();
        }

        function previewImage(url) {
            const img = document.getElementById('imgPreview');
            img.src = url || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%231a1a2e" width="100" height="100"/><text fill="%238892a4" font-size="12" x="50" y="55" text-anchor="middle">Sin imagen</text></svg>';
            img.style.display = 'block';
        }

        function openProductModal(id) {
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '0';
            document.getElementById('productCategory').value = '';
            document.getElementById('productImageUrl').value = '';
            document.getElementById('productActive').checked = true;
            document.getElementById('productModalLabel').textContent = id ? 'Editar Producto' : 'Nuevo Producto';
            previewImage(null);

            if (id) {
                fetch('/api/products/' + id)
                    .then(r => r.json())
                    .then(p => {
                        document.getElementById('productId').value = p.id;
                        document.getElementById('productName').value = p.name || '';
                        document.getElementById('productDescription').value = p.description || '';
                        document.getElementById('productPrice').value = p.price || '';
                        document.getElementById('productStock').value = p.stock ?? 0;
                        document.getElementById('productCategory').value = p.category ? p.category.id : '';
                        document.getElementById('productImageUrl').value = p.imageUrl || '';
                        document.getElementById('productActive').checked = p.active !== false;
                        previewImage(p.imageUrl);
                    });
            }
            productModal.show();
        }

        function saveProduct() {
            const name = document.getElementById('productName').value.trim();
            const price = document.getElementById('productPrice').value;
            if (!name || !price) { showToast('Nombre y precio son obligatorios', 'error'); return; }

            const id = document.getElementById('productId').value;
            const body = {
                name, price: parseFloat(price),
                description: document.getElementById('productDescription').value.trim() || null,
                stock: parseInt(document.getElementById('productStock').value) || 0,
                active: document.getElementById('productActive').checked,
                imageUrl: document.getElementById('productImageUrl').value.trim() || null,
                category: document.getElementById('productCategory').value ? { id: parseInt(document.getElementById('productCategory').value) } : null
            };

            fetch(id ? '/api/products/' + id : '/api/products', {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).then(r => {
                if (r.ok) { location.reload(); } else { showToast('Error al guardar', 'error'); }
            });
        }

        function deleteProduct(id, name) {
            if (confirm(`¿Desactivar "${name}"?`)) {
                fetch('/api/products/' + id, { method: 'DELETE' }).then(r => {
                    if (r.ok) location.reload(); else showToast('Error al eliminar', 'error');
                });
            }
        }

        function openCategoryModal(id) {
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDescription').value = '';
            document.getElementById('categoryActive').checked = true;
            document.getElementById('categoryModalLabel').textContent = id ? 'Editar Categoría' : 'Nueva Categoría';

            if (id) {
                fetch('/api/categories/' + id).then(r => r.json()).then(c => {
                    document.getElementById('categoryId').value = c.id;
                    document.getElementById('categoryName').value = c.name || '';
                    document.getElementById('categoryDescription').value = c.description || '';
                    document.getElementById('categoryActive').checked = c.active !== false;
                });
            }
            categoryModal.show();
        }

        function saveCategory() {
            const name = document.getElementById('categoryName').value.trim();
            if (!name) return showToast('El nombre es obligatorio', 'error');
            const id = document.getElementById('categoryId').value;
            const body = { name, description: document.getElementById('categoryDescription').value.trim() || null, active: document.getElementById('categoryActive').checked };

            fetch(id ? '/api/categories/' + id : '/api/categories', {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).then(r => {
                if (r.ok) location.reload(); else showToast('Error al guardar', 'error');
            });
        }

        function deleteCategory(id, name) {
            if (confirm(`¿Desactivar "${name}"?`)) {
                fetch('/api/categories/' + id, { method: 'DELETE' }).then(r => {
                    if (r.ok) location.reload(); else showToast('Error al eliminar', 'error');
                });
            }
        }

        function uploadCsvFile(input) {
            if (!input.files?.length) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            showToast('Subiendo archivo...', 'success');

            fetch('/admin/upload-csv', { method: 'POST', body: formData })
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    if (data.ok) {
                        showToast(data.message || 'CSV importado correctamente');
                        setTimeout(() => location.reload(), 2000);
                    } else {
                        showToast(data.message || 'Error al procesar el CSV', 'error');
                    }
                })
                .catch(err => {
                    console.error('Error CSV upload:', err);
                    showToast('Error al subir el archivo: ' + err.message, 'error');
                })
                .finally(() => { input.value = ''; });
        }

        // Tema aplicado en el &lt;head&gt; para evitar parpadeo de colores.

    </script>

</body>

</html>
