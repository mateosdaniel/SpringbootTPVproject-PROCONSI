<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF Token for AJAX -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:text="'Gestión de Inventario — ' + ${companySettings.appName}">Gestión de Inventario — ElectroBazar
    </title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="/vendor/fonts/barlow/barlow.css"
        rel="stylesheet">
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <script th:src="@{/js/admin/admin-core.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/admin/admin-productos.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-productos-categorias.css}">
</head>

<body>
    <div id="admin-js-translations" style="display:none" 
         th:attr="data-error-connection=#{common.error.connection},
                  data-error-network=#{common.error.network},
                  data-error-save=#{common.error.save},
                  data-error-delete=#{common.error.delete},
                  data-success-save=#{common.success.save},
                  data-success-delete=#{common.success.delete},
                  data-confirm-delete=#{common.confirm_delete}">
    </div>

    <header class="management-header">
        <a th:href="@{/tpv}" class="m-logo">
            <img th:src="@{/icons/favicon.svg}" alt="Logo" width="32" height="32">
            <span th:text="${companySettings.appName}">ElectroBazar</span>
            <small>| Gestión</small>
        </a>
        <a th:href="@{/tpv}" class="btn-cancel">
            <i class="bi bi-arrow-left"></i> <span th:text="#{admin.inventory.back_to_tpv}">Volver al TPV</span>
        </a>
    </header>

    <div class="admin-body">

        <ul class="nav nav-tabs" id="mgmtTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products-pane"
                    type="button">
                    <i class="bi bi-box-seam"></i> <span th:text="#{admin.inventory.tabs.products}">Productos</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories-pane"
                    type="button">
                    <i class="bi bi-tags"></i> <span th:text="#{admin.inventory.tabs.categories}">Categorias</span>
                </button>
            </li>
        </ul>

        <div class="tab-content" id="mgmtTabsContent">


            <!-- 1. PRODUCTOS -->
            <div class="tab-pane fade show active" id="products-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <a href="/admin#productos" 
                           onclick="if(window.history.length > 1) { history.back(); return false; }"
                           class="btn-icon me-2" th:title="#{common.back}">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        <span th:text="#{admin.inventory.products.management}">Gestión de Productos</span>
                    </h5>
                    <div class="d-flex gap-2">
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;"
                            onchange="uploadCsvFile(this)">
                        <button class="btn-nuevo btn-nuevo-alt" onclick="document.getElementById('csvFileInput').click()">
                            <i class="bi bi-file-earmark-spreadsheet"></i> <span th:text="#{admin.inventory.import_csv}">Importar CSV</span>
                        </button>
                        <button class="btn-nuevo" onclick="openProductModal()">
                            <i class="bi bi-plus-lg"></i> <span th:text="#{admin.inventory.new}">Nuevo Producto</span>
                        </button>
                    </div>
                </div>

                <div th:replace="~{fragments/product-filter :: sharedFilterBar}"></div>
                <div id="productCountLabel" class="small mt-2" style="color: var(--text-muted); padding-left: 0.5rem;">
                    Mostrando todos los productos.
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th class="id-col">ID</th>
                                <th class="center" th:text="#{admin.inventory.table.image}">Imagen</th>
                                <th class="center" th:text="#{common.name}">Nombre</th>
                                <th class="center" th:title="#{admin.common.iva}" th:text="#{admin.common.iva}">IVA</th>
                                <th class="right" style="width: 140px;" th:text="#{admin.common.price}">Precio</th>
                                <th class="center" th:text="#{admin.common.stock}">Stock</th>
                                <th class="center">Unidad</th>
                                <th class="center" th:text="#{admin.common.category}">Categoría</th>
                                <th class="center" th:text="#{admin.taxrates.active}">Activo</th>
                                <th class="right" th:text="#{common.actions}">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr th:each="p : ${products}" class="product-row"
                                th:data-iva="${p.taxRate != null ? p.taxRate.vatRate : ''}">
                                <td class="id-val right" th:text="'#' + ${p.id}"></td>
                                <td class="center">
                                    <img th:if="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        th:src="${p.imageUrl}" class="thumb">
                                    <div th:unless="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        class="thumb-placeholder mx-auto"><i class="bi bi-image"></i></div>
                                </td>
                                <td class="center">
                                    <strong th:text="${p.name}"></strong>
                                    <div class="product-desc-small"
                                        th:if="${p.description != null}"
                                        th:text="${#strings.abbreviate(p.description,60)}">
                                    </div>
                                </td>
                                <td class="product-iva-val center">
                                    <span th:if="${p.taxRate != null && p.taxRate.vatRate != null}"
                                        th:text="${#numbers.formatDecimal(p.taxRate.vatRate * 100, 1, 0)} + '%'"></span>
                                    <span th:unless="${p.taxRate != null && p.taxRate.vatRate != null}"
                                        class="text-muted">-</span>
                                </td>
                                <td class="price-val right"
                                    th:text="${p.measurementUnit != null ? #numbers.formatDecimal(p.price, 1, (p.measurementUnit.decimalPlaces > 2 ? p.measurementUnit.decimalPlaces : 2), 'COMMA') : #numbers.formatDecimal(p.price, 1, 2, 'COMMA')} + ' €'">
                                </td>
                                <td class="center">
                                    <div class="d-flex flex-column align-items-center">
                                        <span th:text="${p.stock == 0 ? '0' : (p.measurementUnit != null ? #numbers.formatDecimal(p.stock, 1, p.measurementUnit.decimalPlaces, 'COMMA') : #numbers.formatDecimal(p.stock, 1, 0, 'COMMA'))}"
                                            th:classappend="${p.stock < 5} ? 'fw-bold text-danger' : ''">0</span>
                                        <span th:if="${p.stock < 5}" class="badge-stock-low"
                                            th:text="#{admin.inventory.stock.low}">Stock Bajo</span>
                                    </div>
                                </td>
                                <td class="center">
                                    <span class="product-unit-val"
                                        th:text="${p.measurementUnit != null ? p.measurementUnit.symbol : '-'}"></span>
                                </td>
                                <td class="center">
                                    <span th:if="${p.category != null}" th:text="${p.category.name}"
                                        class="product-category-val"></span>
                                    <span th:unless="${p.category != null}" class="text-muted">-</span>
                                </td>
                                <td class="center">
                                    <span class="badge-active" th:classappend="${p.active} ? 'yes' : 'no'"
                                        th:text="${p.active} ? #{common.yes} : #{common.no}"></span>
                                </td>
                                <td class="right">
                                    <div class="d-flex gap-2 justify-content-end">
                                        <button class="btn-icon" th:title="#{common.edit}" th:data-id="${p.id}"
                                            onclick="openProductModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:title="#{common.delete}" th:data-id="${p.id}"
                                            th:data-name="${p.name}"
                                            onclick="deleteProduct(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <input type="hidden" id="totalPages" th:value="${productsPage.totalPages}">
                <input type="hidden" id="currentPage" th:value="${productsPage.number}">
                <input type="hidden" id="pageSize" th:value="${pageSize}">

                <div class="pagination-wrap mt-3" th:if="${productsPage != null && productsPage.totalPages > 0}">
                    <button class="pagination-btn" th:onclick="|goToPage(0)|" th:disabled="${productsPage.number == 0}"
                        title="Primera página">
                        <i class="bi bi-chevron-double-left"></i>
                    </button>

                    <button class="pagination-btn" th:onclick="|goToPage(${productsPage.number - 1})|"
                        th:disabled="${productsPage.number == 0}" title="Página anterior">
                        <i class="bi bi-chevron-left"></i>
                    </button>

                    <div class="pagination-jump">
                        <input type="number" id="pageInput" min="1" th:max="${productsPage.totalPages}"
                            th:value="${productsPage.number + 1}"
                            onkeydown="if(event.key === 'Enter') jumpToPage(this.value)" title="Ir a página">
                        <span class="small text-muted">
                            de <span th:text="${productsPage.totalPages}">1</span>
                        </span>
                    </div>

                    <button class="pagination-btn" th:onclick="|goToPage(${productsPage.number + 1})|"
                        th:disabled="${productsPage.number + 1 >= productsPage.totalPages}" title="Página siguiente">
                        <i class="bi bi-chevron-right"></i>
                    </button>

                    <button class="pagination-btn" th:onclick="|goToPage(${productsPage.totalPages - 1})|"
                        th:disabled="${productsPage.number + 1 >= productsPage.totalPages}"
                        th:title="#{admin.inventory.last_page}">
                        <i class="bi bi-chevron-double-right"></i>
                    </button>
                </div>
            </div>

            <!-- 2. CATEGORIAS -->
            <div class="tab-pane fade" id="categories-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <a href="/admin#productos" 
                           onclick="if(window.history.length > 1) { history.back(); return false; }"
                           class="btn-icon me-2" th:title="#{common.back}">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        <span th:text="#{admin.inventory.categories.management}">Gestión de Categorias</span>
                    </h5>
                    <button class="btn-nuevo" onclick="openCategoryModal()">
                        <i class="bi bi-plus-lg"></i> <span th:text="#{admin.inventory.categories.new}">Nueva Categoria</span>
                    </button>
                </div>

                <div class="filter-bar filter-bar-container mb-3 p-3 rounded">
                    <div class="row g-2">
                        <div class="col-md-10">
                            <label class="form-label small mb-1"
                                th:text="#{admin.inventory.categories.search}">Buscar categoria</label>
                            <input type="text" id="categoryFilterSearch" class="form-control form-control-sm"
                                th:placeholder="#{admin.inventory.categories.search.placeholder}"
                                oninput="debounceSharedFilter()">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetCategoryFilters()">
                                <i class="bi bi-arrow-counterclockwise"></i> <span
                                    th:text="#{common.reset}">Reset</span>
                            </button>
                        </div>
                    </div>
                    <div id="categoryCountLabel" class="small mt-2" style="color: var(--text-muted); padding-left: 0.5rem;">
                        Mostrando todas las categorías.
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th th:text="#{common.name}">Nombre</th>
                                <th th:text="#{common.description}">Descripción</th>
                                <th th:text="#{common.status}">Estado</th>
                                <th class="right" th:text="#{common.actions}">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTableBody">
                            <tr th:each="c : ${categories}">
                                <td class="fw-bold" th:text="${c.name}"></td>
                                <td th:text="${c.description}"></td>
                                <td>
                                    <span class="badge-active" th:classappend="${c.active} ? 'yes' : 'no'"
                                        th:text="${c.active} ? #{admin.inventory.status.active} : #{admin.inventory.status.inactive}"></span>
                                </td>
                                <td class="right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${c.id}"
                                            onclick="openCategoryModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${c.id}" th:data-name="${c.name}"
                                            onclick="deleteCategory(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <input type="hidden" id="categoriesTotalPages" th:value="${categoriesPage.totalPages}">
                <input type="hidden" id="categoriesCurrentPage" th:value="${categoriesPage.number}">
                <input type="hidden" id="categoriesPageSize" th:value="${categoriesPageSize}">

                <div class="pagination-wrap mt-3" th:if="${categoriesPage != null && categoriesPage.totalPages > 0}">
                    <button class="pagination-btn" th:onclick="|goToCategoriesPage(0)|"
                        th:disabled="${categoriesPage.number == 0}" title="Primera página">
                        <i class="bi bi-chevron-double-left"></i>
                    </button>

                    <button class="pagination-btn" th:onclick="|goToCategoriesPage(${categoriesPage.number - 1})|"
                        th:disabled="${categoriesPage.number == 0}" title="Página anterior">
                        <i class="bi bi-chevron-left"></i>
                    </button>

                    <div class="pagination-jump">
                        <input type="number" id="categoriesPageInput" min="1" th:max="${categoriesPage.totalPages}"
                            th:value="${categoriesPage.number + 1}"
                            onkeydown="if(event.key === 'Enter') jumpToCategoriesPage(this.value)" title="Ir a página">
                        <span class="small text-muted">
                            de <span th:text="${categoriesPage.totalPages}">1</span>
                        </span>
                    </div>

                    <button class="pagination-btn" th:onclick="|goToCategoriesPage(${categoriesPage.number + 1})|"
                        th:disabled="${categoriesPage.number + 1 >= categoriesPage.totalPages}"
                        title="Página siguiente">
                        <i class="bi bi-chevron-right"></i>
                    </button>

                    <button class="pagination-btn" th:onclick="|goToCategoriesPage(${categoriesPage.totalPages - 1})|"
                        th:disabled="${categoriesPage.number + 1 >= categoriesPage.totalPages}" title="Última página">
                        <i class="bi bi-chevron-double-right"></i>
                    </button>
                </div>
            </div>

        </div>
        <script>
            (function() {
                try {
                    const lastTabId = sessionStorage.getItem('mgmtActiveTab');
                    if (lastTabId && lastTabId !== 'products-tab') {
                        const tabBtn = document.getElementById(lastTabId);
                        if (tabBtn) {
                            document.querySelectorAll('#mgmtTabs .nav-link').forEach(el => el.classList.remove('active'));
                            tabBtn.classList.add('active');
                            const targetSelector = tabBtn.getAttribute('data-bs-target');
                            if (targetSelector) {
                                document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('show', 'active'));
                                const targetPane = document.querySelector(targetSelector);
                                if (targetPane) targetPane.classList.add('show', 'active');
                            }
                        }
                    }
                } catch(e) { console.warn('Tab persistence error:', e); }
            })();
        </script>
    </div>

    <!-- modal PRODUCTO -->
    <th:block th:replace="~{admin/modals/product-modal :: modal}" />

    <!-- modal CATEGORA -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel" th:text="#{common.category}">Categoria</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm" onsubmit="event.preventDefault(); saveCategory();">
                        <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label" th:text="#{admin.category.placeholder.name}">Nombre de la
                            Categoria</label>
                        <input type="text" id="categoryName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" th:text="#{common.description}">Descripción</label>
                        <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="categoryActive">
                        <label class="form-check-label" for="categoryActive"
                            th:text="#{admin.category.active}">Categoria Activa</label>
                    </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal"
                        th:text="#{common.cancel}">Cancelar</button>
                    <button type="submit" class="btn btn-save" form="categoryForm"
                        th:text="#{common.save}">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastMsg" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i id="toastIcon" class="bi"></i>
                    <span id="toastText"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/shared/inventory-filter.js}"></script>
    <script th:src="@{/js/admin/admin-products.js}"></script>
    <script th:src="@{/js/admin/admin-categories.js}"></script>
    <script th:src="@{/js/admin/admin-productos-categorias.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.sharedInventoryI18n = {
            lowStock: /*[[#{admin.inventory.stock.low}]]*/ 'Bajo',
            yes: /*[[#{admin.inventory.status.active}]]*/ 'Activo',
            no: /*[[#{admin.inventory.status.inactive}]]*/ 'Baja',
            noItems: /*[[#{admin.inventory.products.empty}]]*/ 'No hay productos registrados',
            noCats: /*[[#{admin.inventory.categories.empty}]]*/ 'No hay categorias registradas',
            actions_edit: /*[[#{common.edit}]]*/ 'Editar',
            actions_delete: /*[[#{common.delete}]]*/ 'Eliminar'
        };
        /*]]>*/
    </script>
</body>

</html>
