<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF Token for AJAX -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:text="'Gestión de Inventario — ' + ${companySettings.appName}">Gestión de Inventario — ElectroBazar
    </title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <link rel="stylesheet" th:href="@{/css/admin/admin-productos.css}">
</head>

<body>

    <header class="management-header">
        <a th:href="@{/tpv}" class="m-logo">
            <img th:src="@{/icons/favicon.svg}" alt="Logo" width="32" height="32">
            <span th:text="${companySettings.appName}">ElectroBazar</span>
            <small style="font-size: 0.7rem; opacity: 0.6; margin-left: 0.5rem;">| Gestión</small>
        </a>
        <a th:href="@{/tpv}" class="btn-cancel"
            style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <i class="bi bi-arrow-left"></i> Volver al TPV
        </a>
    </header>

    <div class="admin-body">

        <ul class="nav nav-tabs" id="mgmtTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products-pane"
                    type="button">
                    <i class="bi bi-box-seam"></i> Productos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories-pane"
                    type="button">
                    <i class="bi bi-tags"></i> Categorías
                </button>
            </li>
        </ul>

        <div class="tab-content" id="mgmtTabsContent">

            <!-- 1. PRODUCTOS -->
            <div class="tab-pane fade show active" id="products-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <a th:href="@{'/admin?view=' + ${returnView}}" class="btn-icon me-2"
                            style="text-decoration:none;" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        Gestión de Productos
                    </h5>
                    <div class="d-flex gap-2">
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;"
                            onchange="uploadCsvFile(this)">
                        <button class="btn-nuevo" onclick="document.getElementById('csvFileInput').click()"
                            style="background: var(--surface); color: var(--text-main); border: 1px solid var(--border);">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Importar CSV
                        </button>
                        <button class="btn-nuevo" onclick="openProductModal()">
                            <i class="bi bi-plus-lg"></i> Nuevo Producto
                        </button>
                    </div>
                </div>

                <div th:replace="~{fragments/product-filter :: sharedFilterBar}"></div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>IVA</th>
                                <th style="text-align: right;">Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr th:each="p : ${products}" class="product-row"
                                th:data-iva="${p.taxRate != null ? p.taxRate.vatRate : ''}">
                                <td>
                                    <img th:if="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        th:src="${p.imageUrl}" class="thumb">
                                    <div th:unless="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        class="thumb-placeholder"><i class="bi bi-image"></i></div>
                                </td>
                                <td><strong th:text="${p.name}"></strong></td>
                                <td>
                                    <div style="font-size:0.78rem; color:var(--text-muted)"
                                        th:if="${p.description != null}"
                                        th:text="${#strings.abbreviate(p.description,60)}"></div>
                                    <span th:unless="${p.description != null}" style="color:var(--text-muted)">—</span>
                                </td>
                                <td style="font-size:0.9rem; font-weight: 500;">
                                    <span th:if="${p.taxRate != null && p.taxRate.vatRate != null}"
                                        th:text="${#numbers.formatDecimal(p.taxRate.vatRate * 100, 1, 0)} + '%'"></span>
                                    <span th:unless="${p.taxRate != null && p.taxRate.vatRate != null}"
                                        style="color:var(--text-muted)">—</span>
                                </td>
                                <td class="fw-bold" style="color: #000; text-align: right;"
                                    th:text="${#numbers.formatDecimal(p.price, 1, (p.price.stripTrailingZeros().scale() < 2 ? 2 : p.price.stripTrailingZeros().scale()), 'COMMA')} + ' €'">
                                </td>
                                <td>
                                    <div class="d-flex flex-column align-items-center" style="gap: 0.2rem;">
                                        <span th:text="${p.stock}"
                                            th:classappend="${p.stock < 5} ? 'fw-bold text-danger' : ''"></span>
                                        <span th:if="${p.stock < 5}" class="badge-stock-low"
                                            style="font-size: 0.7rem;">Bajo</span>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${p.category != null}" th:text="${p.category.name}"
                                        style="font-size:0.8rem; background:var(--surface); padding:2px 8px; border-radius:5px;"></span>
                                </td>
                                <td>
                                    <span class="badge-active" th:classappend="${p.active} ? 'yes' : 'no'"
                                        th:text="${p.active} ? 'Activo' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${p.id}"
                                            onclick="openProductModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${p.id}" th:data-name="${p.name}"
                                            onclick="deleteProduct(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 2. CATEGORIAS -->
            <div class="tab-pane fade" id="categories-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <a th:href="@{'/admin?view=' + ${returnView}}" class="btn-icon me-2"
                            style="text-decoration:none;" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        Gestión de Categorías
                    </h5>
                    <button class="btn-nuevo" onclick="openCategoryModal()">
                        <i class="bi bi-plus-lg"></i> Nueva Categoría
                    </button>
                </div>

                <div class="filter-bar mb-3 p-3 rounded"
                    style="background: var(--surface); border: 1px solid var(--border);">
                    <div class="row g-2">
                        <div class="col-md-10">
                            <label class="form-label small text-muted mb-1">Buscar categoría</label>
                            <input type="text" id="categoryFilterSearch" class="form-control form-control-sm"
                                placeholder="Nombre o descripción..." oninput="debounceSharedFilter()">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetCategoryFilters()">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                        </div>
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${categories}">
                                <td class="fw-bold" th:text="${c.name}"></td>
                                <td th:text="${c.description}"></td>
                                <td>
                                    <span class="badge-active" th:classappend="${c.active} ? 'yes' : 'no'"
                                        th:text="${c.active} ? 'Activa' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${c.id}"
                                            onclick="openCategoryModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${c.id}" th:data-name="${c.name}"
                                            onclick="deleteCategory(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL PRODUCTO ── -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" id="productName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="productDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Precio (&euro;)</label>
                            <input type="number" id="productPrice" class="form-control" step="0.0001">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Stock Actual</label>
                            <input type="number" id="productStock" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo de IVA</label>
                        <select class="form-select" id="productIvaRate">
                            <!-- Populated dynamically via JS from /admin/api/tax-rates/active -->
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select id="productCategory" class="form-select">
                            <option value="">Selecciona...</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL de Imagen</label>
                        <input type="text" id="productImageUrl" class="form-control" oninput="previewImage(this.value)">
                        <img id="imgPreview" src="" alt="Vista previa">
                    </div>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" id="productActive">
                        <label class="form-check-label" for="productActive">Producto Activo</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveProduct()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL CATEGORÃA ── -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Categoría</label>
                        <input type="text" id="categoryName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="categoryActive">
                        <label class="form-check-label" for="categoryActive">Categoría Activa</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveCategory()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastMsg" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i id="toastIcon" class="bi"></i>
                    <span id="toastText"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin/admin-productos.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.sharedInventoryI18n = {
            lowStock: /*[[#{admin.inventory.filter.stock.low}]]*/ 'Stock Bajo',
            yes: /*[[#{common.yes}]]*/ 'Sí',
            no: /*[[#{common.no}]]*/ 'No',
            noItems: /*[[#{admin.inventory.products.empty}]]*/ 'No hay productos registrados',
            noCats: /*[[#{admin.inventory.categories.empty}]]*/ 'No hay categorías registradas',
            actions_edit: /*[[#{common.edit}]]*/ 'Editar',
            actions_delete: /*[[#{common.delete}]]*/ 'Eliminar'
        };
        /*]]>*/

        function getSharedInvLocale() {
            try {
                const prefs = JSON.parse(localStorage.getItem('tpv-prefs'));
                return (prefs && prefs.language) ? prefs.language : 'es';
            } catch (e) {
                return 'es';
            }
        }

        // Override the shared product table rendering to include new columns (IVA and Descripción)
        if (typeof renderSharedProductsTable === 'function') {
            window.renderSharedProductsTable = function (products) {
                const tbody = document.getElementById('productsTableBody');
                if (!tbody) return;
                tbody.innerHTML = '';
                if (!products || products.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="9" class="text-center p-4 text-muted">${sharedInventoryI18n.noItems}</td></tr>`;
                    return;
                }

                const locale = getSharedInvLocale();
                const isEn = locale === 'en';

                products.forEach(p => {
                    const name = isEn && p.nameEn ? p.nameEn : (p.nameEs || p.name);
                    const description = isEn && p.descriptionEn ? p.descriptionEn : (p.descriptionEs || p.description);
                    const formattedPrice = (p.price || 0).toFixed(2) + ' €';
                    const stockStyle = p.stock < 5 ? 'fw-bold text-danger' : '';
                    const badgeLowStock = p.stock < 5 ? `<span class="badge-stock-low" style="font-size: 0.7rem;">${sharedInventoryI18n.lowStock}</span>` : '';

                    let catName = '—';
                    if (p.category) {
                        catName = isEn && p.category.nameEn ? p.category.nameEn : (p.category.nameEs || p.category.name);
                    }

                    const imgHtml = p.imageUrl
                        ? `<img src="${p.imageUrl}" class="thumb" alt="">`
                        : `<div class="thumb-placeholder"><i class="bi bi-image"></i></div>`;
                    const activeBadge = p.active
                        ? `<span class="badge-active yes">${sharedInventoryI18n.yes}</span>`
                        : `<span class="badge-active no">${sharedInventoryI18n.no}</span>`;
                    const ivaDisplay = p.taxRate && p.taxRate.vatRate != null ? (p.taxRate.vatRate * 100).toFixed(0) + '%' : '—';
                    const descTruncated = description ? (description.length > 60 ? description.substring(0, 57) + '...' : description) : '—';
                    const escapedName = name ? name.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';

                    let tr = document.createElement('tr');
                    tr.className = 'product-row';
                    tr.setAttribute('data-iva', p.taxRate ? p.taxRate.vatRate : null);
                    tr.innerHTML = `
                        <td>${imgHtml}</td>
                        <td><strong>${name}</strong></td>
                        <td><div style="font-size:0.78rem;color:var(--text-muted)">${descTruncated}</div></td>
                        <td style="font-size:0.9rem; font-weight: 500;">${ivaDisplay}</td>
                        <td class="fw-bold" style="color: #000;">${formattedPrice}</td>
                        <td><div class="d-flex flex-column align-items-center" style="gap: 0.2rem;"><span class="${stockStyle}">${p.stock}</span> ${badgeLowStock}</div></td>
                        <td><span style="font-size:0.8rem; background:var(--surface); padding:2px 8px; border-radius:5px;">${catName}</span></td>
                        <td>${activeBadge}</td>
                        <td style="text-align:right">
                            <div class="d-flex gap-1 justify-content-end">
                                <button class="btn-icon" title="${sharedInventoryI18n.actions_edit}" onclick="openProductModal(${p.id})"><i class="bi bi-pencil"></i></button>
                                <button class="btn-icon danger" title="${sharedInventoryI18n.actions_delete}" onclick="deleteProduct(${p.id}, '${escapedName}')"><i class="bi bi-trash"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                if (typeof filterProducts === 'function') filterProducts();
            };
        }

        function filterProducts() {
            const ivaFilter = document.getElementById('sharedFilterIvaRate');
            if (!ivaFilter) return;
            const selectedIva = ivaFilter.value;
            const rows = document.querySelectorAll('.product-row');
            rows.forEach(row => {
                const rowIva = row.getAttribute('data-iva');
                let matchesIva = true;
                if (selectedIva !== "") {
                    const val = rowIva ? parseFloat(rowIva).toFixed(2) : null;
                    const target = parseFloat(selectedIva).toFixed(2);
                    matchesIva = (val === target);
                }
                row.style.display = matchesIva ? '' : 'none';
            });
        }
    </script>
</body>

</html>
