<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesti&oacute;n de Inventario &mdash; ElectroBazar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        /* Apply theme before render to avoid flash */
    </style>
    <script>
        (function () {
            function hexToRgb(hex) {
                let r = 0, g = 0, b = 0;
                if (hex.length === 7) {
                    r = parseInt(hex.slice(1, 3), 16);
                    g = parseInt(hex.slice(3, 5), 16);
                    b = parseInt(hex.slice(5, 7), 16);
                }
                return r + ", " + g + ", " + b;
            }
            const accentColors = [
                { value: '#ffffff', hover: '#e0e0e0' },
                { value: '#f5a623', hover: '#e09400' },
                { value: '#3b82f6', hover: '#2563eb' },
                { value: '#22c55e', hover: '#16a34a' },
                { value: '#ef4444', hover: '#dc2626' },
                { value: '#a855f7', hover: '#9333ea' },
                { value: '#ec4899', hover: '#db2777' },
                { value: '#06b6d4', hover: '#0891b2' }
            ];
            const darkP = [
                { primary: '#151525', secondary: '#1e1e35', surface: '#252545', border: '#2c2c4d', muted: '#8892a4', text: '#e8eaf0' },
                { primary: '#000000', secondary: '#0c0c0c', surface: '#161616', border: '#222222', muted: '#777777', text: '#e0e0e0' },
                { primary: '#121212', secondary: '#1a1a1a', surface: '#242424', border: '#2d2d2d', muted: '#888888', text: '#e8e8e8' },
            ];
            const lightP = [
                { name: 'Blanco Puro', primary: '#ffffff', secondary: '#f8fafc', surface: '#f1f5f9' },
                { name: 'Arena', primary: '#f5edc5', secondary: '#faf3e0', surface: '#f0e6c8' },
                { name: 'Ceniza', primary: '#eef2f7', secondary: '#e4e9f0', surface: '#d8e0ea' },
            ];
            const lightFixed = { border: '#dae1e7', muted: '#64748b', text: '#0f172a' };
            const defaultPrefs = { mode: 'light', lightAccent: 0, lightPrimaryIdx: 0, darkAccent: 7, darkPrimaryIdx: 0 };

            let prefs = JSON.parse(localStorage.getItem('tpv-prefs') || 'null');
            if (prefs && prefs.darkPrimaryIdx >= darkP.length) prefs.darkPrimaryIdx = 0;
            if (prefs && prefs.lightPrimaryIdx >= lightP.length) prefs.lightPrimaryIdx = 0;
            if (!prefs || prefs.accent !== undefined) {
                prefs = { ...defaultPrefs, mode: prefs ? prefs.mode : 'dark' };
                localStorage.setItem('tpv-prefs', JSON.stringify(prefs));
            }

            const isDark = prefs.mode === 'dark';
            let currentAccentIdx = isDark ? prefs.darkAccent : prefs.lightAccent;
            if (currentAccentIdx >= accentColors.length) currentAccentIdx = 0;
            const currentPrimaryIdx = isDark ? prefs.darkPrimaryIdx : prefs.lightPrimaryIdx;

            const accent = accentColors[currentAccentIdx] || accentColors[isDark ? 7 : 1];
            const palette = isDark ? darkP : lightP;
            const p = palette[currentPrimaryIdx] || palette[0];

            let accentValue = accent.value;
            let accentHover = accent.hover;
            if (currentAccentIdx === 0) {
                accentValue = isDark ? '#ffffff' : '#000000';
                accentHover = isDark ? '#e0e0e0' : '#333333';
            }

            const rStyles = document.documentElement.style;
            rStyles.setProperty('--primary', p.primary);
            rStyles.setProperty('--secondary', p.secondary);
            rStyles.setProperty('--surface', p.surface);
            if (isDark) {
                rStyles.setProperty('--border', p.border);
                rStyles.setProperty('--text-muted', p.muted);
                rStyles.setProperty('--text-main', p.text);
                rStyles.setProperty('--close-filter', 'invert(1)');
            } else {
                rStyles.setProperty('--border', lightFixed.border);
                rStyles.setProperty('--text-muted', lightFixed.muted);
                rStyles.setProperty('--text-main', lightFixed.text);
                rStyles.setProperty('--close-filter', 'none');
            }

            if (currentAccentIdx === 0) {
                if (isDark && p.primary === '#000000') rStyles.setProperty('--border', '#222222');
                if (!isDark && p.primary === '#ffffff') rStyles.setProperty('--border', '#e0e0e0');
            }

            rStyles.setProperty('--accent', accentValue);
            rStyles.setProperty('--accent-hover', accentHover);
            rStyles.setProperty('--accent-rgb', hexToRgb(accentValue));

            let logoFile = isDark ? '/icons/favicon.svg' : '/icons/favicon-light.svg';
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('img[alt="Logo"], img[alt="Logo ElectroBazar"]').forEach(img => img.src = logoFile);
                const faviconLink = document.querySelector('link[rel="icon"]');
                if (faviconLink) faviconLink.href = logoFile;
            });

            // Live-sync: re-apply theme when preferences change in another tab/window
            window.addEventListener('storage', function (e) {
                if (e.key !== 'tpv-prefs' || !e.newValue) return;
                const p2 = JSON.parse(e.newValue);
                const isDark2 = p2.mode === 'dark';
                let accentIdx2 = isDark2 ? p2.darkAccent : p2.lightAccent;
                if (accentIdx2 >= accentColors.length) accentIdx2 = 0;
                const primaryIdx2 = isDark2 ? p2.darkPrimaryIdx : p2.lightPrimaryIdx;
                const palette2 = isDark2 ? darkP : lightP;
                const pal2 = palette2[primaryIdx2] || palette2[0];
                let accentVal2 = accentColors[accentIdx2] ? accentColors[accentIdx2].value : accentColors[0].value;
                let accentHov2 = accentColors[accentIdx2] ? accentColors[accentIdx2].hover : accentColors[0].hover;
                if (accentIdx2 === 0) {
                    accentVal2 = isDark2 ? '#ffffff' : '#000000';
                    accentHov2 = isDark2 ? '#e0e0e0' : '#333333';
                }
                const rs = document.documentElement.style;
                rs.setProperty('--primary', pal2.primary);
                rs.setProperty('--secondary', pal2.secondary);
                rs.setProperty('--surface', pal2.surface);
                if (isDark2) {
                    rs.setProperty('--border', pal2.border);
                    rs.setProperty('--text-muted', pal2.muted);
                    rs.setProperty('--text-main', pal2.text);
                    rs.setProperty('--close-filter', 'invert(1)');
                } else {
                    rs.setProperty('--border', lightFixed.border);
                    rs.setProperty('--text-muted', lightFixed.muted);
                    rs.setProperty('--text-main', lightFixed.text);
                    rs.setProperty('--close-filter', 'none');
                }
                if (accentIdx2 === 0) {
                    if (isDark2 && pal2.primary === '#000000') rs.setProperty('--border', '#222222');
                    if (!isDark2 && pal2.primary === '#ffffff') rs.setProperty('--border', '#e0e0e0');
                }
                rs.setProperty('--accent', accentVal2);
                rs.setProperty('--accent-hover', accentHov2);
                rs.setProperty('--accent-rgb', hexToRgb(accentVal2));
                const logoFile2 = isDark2 ? '/icons/favicon.svg' : '/icons/favicon-light.svg';
                document.querySelectorAll('img[alt="Logo"], img[alt="Logo ElectroBazar"]').forEach(function (img) { img.src = logoFile2; });
                const faviconLink2 = document.querySelector('link[rel="icon"]');
                if (faviconLink2) faviconLink2.href = logoFile2;
            });
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/admin/admin-productos.css}">
</head>

<body>

    <header class="management-header">
        <a th:href="@{/tpv}" class="m-logo">
            <img th:src="@{/icons/favicon.svg}" alt="Logo" width="32" height="32">
            Electro<span>Bazar</span> <small style="font-size: 0.7rem; opacity: 0.6; margin-left: 0.5rem;">|
                Gestión</small>
        </a>
        <a th:href="@{/tpv}" class="btn-cancel"
            style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <i class="bi bi-arrow-left"></i> Volver al TPV
        </a>
    </header>

    <div class="admin-body">

        <ul class="nav nav-tabs" id="mgmtTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products-pane"
                    type="button">
                    <i class="bi bi-box-seam"></i> Productos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories-pane"
                    type="button">
                    <i class="bi bi-tags"></i> Categorías
                </button>
            </li>
        </ul>

        <div class="tab-content" id="mgmtTabsContent">

            <!-- 1. PRODUCTOS -->
            <div class="tab-pane fade show active" id="products-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <button class="btn-icon me-2" onclick="window.history.back()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        Gestión de Productos
                    </h5>
                    <div class="d-flex gap-2">
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;"
                            onchange="uploadCsvFile(this)">
                        <button class="btn-nuevo" onclick="document.getElementById('csvFileInput').click()"
                            style="background: var(--surface); color: var(--text-main); border: 1px solid var(--border);">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Importar CSV
                        </button>
                        <button class="btn-nuevo" onclick="openProductModal()">
                            <i class="bi bi-plus-lg"></i> Nuevo Producto
                        </button>
                    </div>
                </div>

                <div th:replace="~{fragments/product-filter :: sharedFilterBar}"></div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr th:each="p : ${products}">
                                <td>
                                    <img th:if="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        th:src="${p.imageUrl}" class="thumb">
                                    <div th:unless="${p.imageUrl != null && !#strings.isEmpty(p.imageUrl)}"
                                        class="thumb-placeholder"><i class="bi bi-image"></i></div>
                                </td>
                                <td>
                                    <strong th:text="${p.name}"></strong>
                                    <div style="font-size:0.75rem; color:var(--text-muted)"
                                        th:if="${p.description != null}"
                                        th:text="${#strings.abbreviate(p.description,60)}"></div>
                                </td>
                                <td class="fw-bold text-accent"
                                    th:text="${#numbers.formatDecimal(p.price,1,2)} + ' &euro;'">
                                </td>
                                <td th:text="${p.stock}"></td>
                                <td>
                                    <span th:if="${p.category != null}" th:text="${p.category.name}"
                                        style="font-size:0.8rem; background:var(--surface); padding:2px 8px; border-radius:5px;"></span>
                                </td>
                                <td>
                                    <span class="badge-active" th:classappend="${p.active} ? 'yes' : 'no'"
                                        th:text="${p.active} ? 'Activo' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${p.id}"
                                            onclick="openProductModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${p.id}" th:data-name="${p.name}"
                                            onclick="deleteProduct(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 2. CATEGORIAS -->
            <div class="tab-pane fade" id="categories-pane">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">
                        <button class="btn-icon me-2" onclick="window.history.back()" title="Volver">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        Gestión de Categorías
                    </h5>
                    <button class="btn-nuevo" onclick="openCategoryModal()">
                        <i class="bi bi-plus-lg"></i> Nueva Categoría
                    </button>
                </div>

                <div class="filter-bar mb-3 p-3 rounded"
                    style="background: var(--surface); border: 1px solid var(--border);">
                    <div class="row g-2">
                        <div class="col-md-10">
                            <label class="form-label small text-muted mb-1">Buscar categoría</label>
                            <input type="text" id="categoryFilterSearch" class="form-control form-control-sm"
                                placeholder="Nombre o descripción..." oninput="debounceSharedFilter()">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetCategoryFilters()">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                        </div>
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th style="text-align:right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${categories}">
                                <td class="fw-bold" th:text="${c.name}"></td>
                                <td th:text="${c.description}"></td>
                                <td>
                                    <span class="badge-active" th:classappend="${c.active} ? 'yes' : 'no'"
                                        th:text="${c.active} ? 'Activa' : 'Baja'"></span>
                                </td>
                                <td style="text-align:right">
                                    <div class="d-flex gap-1 justify-content-end">
                                        <button class="btn-icon" th:data-id="${c.id}"
                                            onclick="openCategoryModal(this.getAttribute('data-id'))">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn-icon danger" th:data-id="${c.id}" th:data-name="${c.name}"
                                            onclick="deleteCategory(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL PRODUCTO ── -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" id="productName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="productDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Precio (&euro;)</label>
                            <input type="number" id="productPrice" class="form-control" step="0.01">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Stock Actual</label>
                            <input type="number" id="productStock" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select id="productCategory" class="form-select">
                            <option value="">Selecciona...</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL de Imagen</label>
                        <input type="text" id="productImageUrl" class="form-control" oninput="previewImage(this.value)">
                        <img id="imgPreview" src="" alt="Vista previa">
                    </div>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" id="productActive">
                        <label class="form-check-label" for="productActive">Producto Activo</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveProduct()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MODAL CATEGORÃA ── -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Categoría</label>
                        <input type="text" id="categoryName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="categoryActive">
                        <label class="form-check-label" for="categoryActive">Categoría Activa</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-save" onclick="saveCategory()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastMsg" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i id="toastIcon" class="bi"></i>
                    <span id="toastText"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/shared/inventory-filter.js}"></script>
    <script th:src="@{/js/admin/admin-productos.js}"></script>

</body>

</html>
