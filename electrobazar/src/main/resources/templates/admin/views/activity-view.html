<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="view">

    <div id="activityView" style="display:none">
        <div class="panel-header mb-4">
            <span class="panel-title">
                <button class="btn-icon me-2"
                    onclick="backToPreviousView()"
                    th:title="#{admin.common.backtopanel}">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <i class="bi bi-clock-history me-2"></i><span th:text="#{admin.activity.title}">Registro de
                    Actividiad Reciente</span>
            </span>
        </div>

        <div class="filter-bar-custom mb-3">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small mb-1" style="color: var(--text-main);"><i
                            class="bi bi-search me-2"></i><span th:text="#{admin.activity.search}">Búsqueda
                            rápida</span></label>
                    <input type="text" id="activityFilterSearch" class="form-control form-control-sm"
                        placeholder="Buscar en descripción..." oninput="filterActivity()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1" style="color: var(--text-main);"><i
                            class="bi bi-lightning-charge me-2"></i><span
                            th:text="#{common.actions}">Acción</span></label>
                    <input type="text" id="activityFilterAction" class="form-control form-control-sm"
                        placeholder="Ej: VENTA, CREAR, LOGIN..." oninput="filterActivity()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1" style="color: var(--text-main);"><i
                            class="bi bi-person me-2"></i><span>Usuario</span></label>
                    <input type="text" id="activityFilterUsername" class="form-control form-control-sm"
                        placeholder="Nombre de usuario..." oninput="filterActivity()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1" style="color: var(--text-main);"><i
                            class="bi bi-sort-down me-1"></i>Orden</label>
                    <select id="activitySortBy" class="form-select form-select-sm" onchange="filterActivity()">
                        <option value="timestamp">Cronológico</option>
                        <option value="action">Acción</option>
                        <option value="level">Nivel</option>
                        <option value="username">Usuario</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <label class="form-label small mb-1" style="color: var(--text-main);">&nbsp;</label>
                    <select id="activitySortDir" class="form-select form-select-sm" onchange="filterActivity()">
                        <option value="desc">↓ Reciente</option>
                        <option value="asc">↑ Antiguo</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetActivityFilters()">
                        <i class="bi bi-arrow-counterclockwise me-1"></i> <span th:text="#{common.reset}">Reset</span>
                    </button>
                </div>
            </div>
            <div id="activityCountLabel" class="small mt-2" style="color: var(--text-muted); padding-left: 0.5rem;">
                Mostrando todos los registros de actividad.
            </div>
        </div>

        <div class="admin-table-wrap mt-3">
            <table class="admin-table" id="activityTable">
                <thead>
                    <tr>
                        <th style="width: 60px;">LVL</th>
                        <th th:text="#{admin.activity.time}">Fecha/Hora</th>
                        <th th:text="#{admin.activity.user}">Usuario</th>
                        <th th:text="#{admin.activity.action}">Acción</th>
                        <th th:text="#{admin.activity.desc}">Descripción</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody">
                    <!-- data loaded via JS -->
                </tbody>
            </table>
        </div>
        <div id="activityPaginationContainer"></div>
    </div>

</th:block>
</body>
</html>
