<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.sale.detail.title} + ' — ' + ${companySettings.appName}">Detalle de Venta — ElectroBazar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <link rel="stylesheet" th:href="@{/css/admin/admin-main.css}">
    
    <style>
        body {
            background-color: var(primary);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            padding: 2rem;
            min-height: 100vh;
        }
        .detail-container {
            max-width: 1050px;
            margin: 0 auto;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
            margin-bottom: 3rem;
        }
        .summary-item {
            background: var(--surface);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }
        .summary-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        .summary-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem;
        }
        .summary-value {
            font-size: 1.35rem;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
        }
        .btn-back {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-back:hover {
            background: var(--border);
            transform: translateX(-3px);
            color: var(--text-main);
        }
        .btn-action {
            background: var(--accent);
            color: var(primary);
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-action:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 166, 35, 0.3);
            color: var(primary);
        }
        .lines-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-main);
        }
        .text-accent {
            color: var(--accent) !important;
        }
        .badge-status {
            font-size: 0.75rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-active { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-cancelled { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .totals-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-left: auto;
            max-width: 350px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .total-row.main {
            border-top: 1px diashed var(--border);
            margin-top: 1rem;
            padding-top: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'Barlow Condensed';
        }
        .movement-icon {
            font-size: 1.2rem;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(var(accent-rgb), 0.1);
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="detail-container">
    <div class="header-actions">
        <div>
            <div class="d-flex align-items-center gap-3 mb-1">
                <h2 class="mb-0 fw-bold">
                    <i class="bi bi-receipt me-2 text-accent"></i>
                    <span th:text="${sale.invoice != null} ? #{admin.invoices.type.invoice} : #{admin.invoices.type.ticket}">Venta</span> 
                    <span class="text-muted ms-2" th:text="${sale.invoice != null ? sale.invoice.invoiceNumber : (sale.ticket != null ? sale.ticket.ticketNumber : '#' + sale.id)}"></span>
                </h2>
                <span class="badge-status" 
                      th:classappend="${sale.status.name() == 'ACTIVE'} ? 'status-active' : 'status-cancelled'"
                      th:text="${sale.status.name() == 'ACTIVE'} ? #{common.active} : #{admin.invoices.status.cancelled}">
                </span>
            </div>
            <div class="small text-muted" th:text="${#temporals.format(sale.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
        </div>
        <div class="d-flex gap-3">
            <a href="javascript:history.back()" class="btn-back">
                <i class="bi bi-arrow-left me-2"></i> <span th:text="#{common.back}">Volver</span>
            </a>
            <a th:href="@{/tpv/receipt/{id}(id=${sale.id}, autoPrint=true)}" target="_blank" class="btn-action">
                <i class="bi bi-printer me-2"></i> <span th:text="#{admin.invoices.print}">Imprimir</span>
            </a>
        </div>
    </div>

    <!-- Resumen de la Venta -->
    <div class="summary-grid">
        <div class="summary-item">
            <div class="summary-label" th:text="#{admin.invoices.customer}">Cliente</div>
            <div class="summary-value" th:text="${sale.customer != null} ? ${sale.customer.name} : #{admin.invoices.customer.final}"></div>
            <div class="small text-muted" th:if="${sale.customer != null}" th:text="${sale.customer.taxId}"></div>
        </div>
        <div class="summary-item">
            <div class="summary-label" th:text="#{admin.invoices.worker}">Atendido por</div>
            <div class="summary-value text-accent" th:text="${sale.worker != null} ? ${sale.worker.username} : #{admin.invoices.worker.system}"></div>
        </div>
        <div class="summary-item">
            <div class="summary-label" th:text="#{admin.invoices.payment.method}">Método Pago</div>
            <div class="summary-value d-flex align-items-center gap-2">
                <i th:class="${sale.paymentMethod.name() == 'CASH' ? 'bi bi-cash' : (sale.paymentMethod.name() == 'CARD' ? 'bi bi-credit-card' : 'bi bi-wallet2')}"></i>
                <span th:text="${sale.paymentMethod.name() == 'CASH'} ? #{admin.invoices.payment.cash} : (${sale.paymentMethod.name() == 'CARD'} ? #{admin.invoices.payment.card} : 'Mixto')"></span>
            </div>
        </div>
        <div class="summary-item">
            <div class="summary-label" th:text="#{common.amount}">Importe Total</div>
            <div class="summary-value" th:text="${#numbers.formatDecimal(sale.totalAmount, 1, 2)} + ' '"></div>
        </div>
        
        <th:block th:if="${sale.paymentMethod.name() == 'MIXED'}">
            <div class="summary-item">
                <div class="summary-label" th:text="#{admin.invoices.payment.cash}">Efectivo</div>
                <div class="summary-value" th:text="${#numbers.formatDecimal(sale.cashAmount, 1, 2)} + ' '"></div>
            </div>
            <div class="summary-item">
                <div class="summary-label" th:text="#{admin.invoices.payment.card}">Tarjeta</div>
                <div class="summary-value" th:text="${#numbers.formatDecimal(sale.cardAmount, 1, 2)} + ' '"></div>
            </div>
        </th:block>
        
        <th:block th:if="${sale.receivedAmount != null && sale.receivedAmount > 0}">
            <div class="summary-item">
                <div class="summary-label">Entregado</div>
                <div class="summary-value" th:text="${#numbers.formatDecimal(sale.receivedAmount, 1, 2)} + ' '"></div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Cambio</div>
                <div class="summary-value text-accent" th:text="${#numbers.formatDecimal(sale.changeAmount, 1, 2)} + ' '"></div>
            </div>
        </th:block>
        
        <div class="summary-item">
            <div class="summary-label" th:text="#{admin.menu.tariffs}">Tarifa Aplicada</div>
            <div class="summary-value" th:text="${sale.appliedTariff}"></div>
        </div>
    </div>

    <!-- Notas -->
    <div th:if="${sale.notes != null && !#strings.isEmpty(sale.notes)}" class="mb-4 p-3 rounded" style="background: var(--surface); border-left: 4px solid var(--accent);">
        <div class="summary-label mb-1" th:text="#{common.notes}">Notas de la venta</div>
        <div class="text-main fw-500" th:text="${sale.notes}"></div>
    </div>

    <!-- Lineas de Venta -->
    <div class="sales-section">
        <h3 class="lines-title">
            <i class="bi bi-list-ul text-accent"></i>
            <span th:text="#{admin.inventory.tabs.products}">Productos</span>
            <span class="badge rounded-pill badge-count" th:text="${#lists.size(sale.lines)}">0</span>
        </h3>
        
        <div class="admin-table-wrap mb-4">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th th:text="#{common.name}">Producto</th>
                        <th class="text-center" th:text="#{admin.common.stock}">Cant.</th>
                        <th class="text-end" th:text="#{admin.common.price}">P. Unit.</th>
                        <th class="text-center" th:text="#{admin.common.iva}">IVA</th>
                        <th class="text-end" th:text="#{common.total}">Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="line : ${sale.lines}">
                        <td>
                            <div class="fw-bold text-main" th:text="${line.productName != null ? line.productName : (line.product != null ? line.product.name : 'Producto')}"></div>
                            <div th:if="${line.discountPercentage > 0}" class="small text-success">
                                <i class="bi bi-tag-fill me-1"></i>
                                <span th:text="${#numbers.formatDecimal(line.discountPercentage, 1, 0)} + '% Dto.'"></span>
                            </div>
                        </td>
                        <td class="text-center" th:text="${line.quantity} + ' ud.'"></td>
                        <td class="text-end">
                            <span th:if="${line.discountPercentage > 0}" class="text-muted text-decoration-line-through small me-1" th:text="${#numbers.formatDecimal(line.originalUnitPrice, 1, 2)} + ' '"></span>
                            <span th:text="${#numbers.formatDecimal(line.unitPrice, 1, 2)} + ' '"></span>
                        </td>
                        <td class="text-center" th:text="${#numbers.formatDecimal(line.vatRate * 100, 1, 0)} + '%'"></td>
                        <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(line.subtotal, 1, 2)} + ' '"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="totals-card">
            <div class="total-row">
                <span th:text="#{admin.taxrates.iva.full}">Base Imponible</span>
                <span th:text="${#numbers.formatDecimal(sale.totalBase, 1, 2)} + ' '"></span>
            </div>
            <div class="total-row">
                <span th:text="#{admin.common.iva}">IVA Total</span>
                <span th:text="${#numbers.formatDecimal(sale.totalVat, 1, 2)} + ' '"></span>
            </div>
            <div th:if="${sale.totalRecargo > 0}" class="total-row">
                <span th:text="#{admin.taxrates.re}">Recargo Equiv.</span>
                <span th:text="${#numbers.formatDecimal(sale.totalRecargo, 1, 2)} + ' '"></span>
            </div>
            <div class="total-row main">
                <span th:text="#{common.total}">TOTAL</span>
                <span th:text="${#numbers.formatDecimal(sale.totalAmount, 1, 2)} + ' '"></span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
