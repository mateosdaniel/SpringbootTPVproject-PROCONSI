<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.returns.detail.title} + ' — ' + ${companySettings.appName}">Detalle de Devolución — ElectroBazar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    
    <th:block th:replace="~{fragments/theme :: themeScript}" />
    <link rel="stylesheet" th:href="@{/css/admin/admin-main.css}">
    
    <style>
        body {
            background-color: var(--primary);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            padding: 2rem;
            min-height: 100vh;
        }
        .detail-container {
            max-width: 1050px;
            margin: 0 auto;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
            margin-bottom: 3rem;
        }
        .summary-item {
            background: var(--surface);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }
        .summary-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        .summary-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem;
        }
        .summary-value {
            font-size: 1.35rem;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
        }
        .btn-back {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-back:hover {
            background: var(--border);
            transform: translateX(-3px);
            color: var(--text-main);
        }
        .btn-action {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-action:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 166, 35, 0.3);
            color: var(--primary);
        }
        .lines-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-main);
        }
        .text-accent {
            color: var(--accent) !important;
        }
        .badge-status {
            font-size: 0.75rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-completed { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-cancelled { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .totals-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-left: auto;
            max-width: 350px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .total-row.main {
            border-top: 1px dashed var(--border);
            margin-top: 1rem;
            padding-top: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'Barlow Condensed';
        }
    </style>
</head>
<body>

<div class="detail-container">
    <div class="header-actions">
        <div>
            <div class="d-flex align-items-center gap-3 mb-1">
                <h2 class="mb-0 fw-bold">
                    <i class="bi bi-arrow-counterclockwise me-2 text-accent"></i>
                    <span th:text="#{admin.menu.returns}">Devolución</span> 
                    <span class="text-muted ms-2" th:text="${return.returnNumber}"></span>
                </h2>
                <span class="badge-status" 
                      th:classappend="${return.status.name() == 'COMPLETED'} ? 'status-completed' : 'status-cancelled'"
                      th:text="#{common.completed}">
                </span>
            </div>
            <div class="small text-muted" th:text="${#temporals.format(return.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
        </div>
        <div class="d-flex gap-3">
            <a th:href="@{/admin?view=returnsHistoryView}" class="btn-back">
                <i class="bi bi-arrow-left me-2"></i> <span th:text="#{common.back}">Volver</span>
            </a>
            <a th:href="@{/tpv/return-receipt/{id}(id=${return.id})}" target="_blank" class="btn-action">
                <i class="bi bi-printer me-2"></i> <span th:text="#{admin.invoices.print}">Imprimir</span>
            </a>
        </div>
    </div>

    <!-- Resumen de la Devolución -->
    <div class="summary-grid">
        <div class="summary-item">
            <div class="summary-label" th:text="#{admin.returns.original}">Ticket Original</div>
            <div class="summary-value">
                <a th:href="@{/admin/sale/{id}(id=${return.originalSale.id})}" class="text-accent text-decoration-none">
                     <span th:text="${return.originalSale.invoice != null ? return.originalSale.invoice.invoiceNumber : (return.originalSale.ticket != null ? return.originalSale.ticket.ticketNumber : '#' + return.originalSale.id)}"></span>
                </a>
            </div>
        </div>
        <div class="summary-item">
            <div class="summary-label" th:text="#{common.type}">Tipo</div>
            <div class="summary-value" th:text="${return.type.name() == 'TOTAL'} ? #{common.total} : #{common.partial}"></div>
        </div>
        <div class="summary-item">
            <div class="summary-label" th:text="#{admin.invoices.payment.method}">Método Reembolso</div>
            <div class="summary-value d-flex align-items-center gap-2">
                <i th:class="${return.paymentMethod.name() == 'CASH' ? 'bi bi-cash' : 'bi bi-credit-card'}"></i>
                <span th:text="${return.paymentMethod.name() == 'CASH'} ? #{admin.invoices.payment.cash} : #{admin.invoices.payment.card}"></span>
            </div>
        </div>
        <div class="summary-item">
            <div class="summary-label" th:text="#{common.amount}">Importe Reembolsado</div>
            <div class="summary-value text-danger" th:text="'- ' + ${#numbers.formatDecimal(return.totalRefunded, 1, 2)} + ' €'"></div>
        </div>
        <div class="summary-item" th:if="${return.worker != null}">
            <div class="summary-label" th:text="#{admin.invoices.worker}">Procesado por</div>
            <div class="summary-value" th:text="${return.worker.username}"></div>
        </div>
        <div class="summary-item" th:if="${return.originalSale.customer != null}">
            <div class="summary-label" th:text="#{admin.invoices.customer}">Cliente</div>
            <div class="summary-value" th:text="${return.originalSale.customer.name}"></div>
        </div>
    </div>

    <!-- Motivo -->
    <div class="mb-4 p-3 rounded" style="background: var(--surface); border-left: 4px solid var(--accent);">
        <div class="summary-label mb-1" th:text="#{common.reason}">Motivo de la devolución</div>
        <div class="text-main fw-500" th:text="${return.reason ?: 'No especificado'}"></div>
    </div>

    <!-- Líneas de Devolución -->
    <div class="sales-section">
        <h3 class="lines-title">
            <i class="bi bi-list-check text-accent"></i>
            <span th:text="#{admin.inventory.tabs.products}">Productos Devueltos</span>
            <span class="badge rounded-pill badge-count" th:text="${#lists.size(return.lines)}">0</span>
        </h3>
        
        <div class="admin-table-wrap mb-4">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th th:text="#{common.name}">Producto</th>
                        <th class="text-center" th:text="#{admin.common.stock}">Cant. Devuelta</th>
                        <th class="text-end" th:text="#{admin.common.price}">P. Unit.</th>
                        <th class="text-end" th:text="#{common.total}">Reembolso Línea</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="line : ${return.lines}">
                        <td class="fw-bold text-main" th:text="${line.saleLine.product.name}"></td>
                        <td class="text-center" th:text="${line.quantity} + ' ud.'"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(line.saleLine.unitPrice, 1, 2)} + ' €'"></td>
                        <td class="text-end fw-bold text-danger" th:text="'- ' + ${#numbers.formatDecimal(line.refundedAmount, 1, 2)} + ' €'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="totals-card">
            <div class="total-row main">
                <span th:text="#{common.total}">TOTAL REEMBOLSADO</span>
                <span th:text="${#numbers.formatDecimal(return.totalRefunded, 1, 2)} + ' €'"></span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
