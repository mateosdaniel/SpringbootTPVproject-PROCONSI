spring.application.name=electrobazar

# ==================== ENCODING ====================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8

# ==================== BASE DE DATOS ====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== SQL INIT ====================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==================== SERVIDOR ====================
server.port=${SERVER_PORT:8080}

# ==================== THYMELEAF ====================
spring.thymeleaf.cache=false

# ==================== ADMIN ====================
admin.pin=${ADMIN_PIN:}

# ==================== CACHE ====================
# Using Caffeine for in-memory caching with TTL support
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m
# Cache names used in the application
spring.cache.cache-names=productPrices

# ==================== SCHEDULING ====================
# Timezone for @Scheduled cron expressions (matches the application timezone)
spring.task.scheduling.pool.size=2

# Limita conexiones al pool para no saturar Railway desde local
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# Evita conexiones muertas
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=20000

# ==================== TPV SECURITY ====================
tpv.security.token=${TPV_TOKEN:TPV-SECRET-STATIC-TOKEN-12345}

# ==================== LOGGING ====================
logging.level.root=WARN
logging.level.com.proconsi=DEBUG

