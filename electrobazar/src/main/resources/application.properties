spring.application.name=electrobazar

# ==================== ENCODING & I18N ====================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ==================== DEPLOYMENT & DEVTOOLS ====================
# Resolve InstanceAlreadyExistsException with DevTools / Hot-reloads
spring.application.admin.enabled=false
spring.jmx.enabled=false
spring.jmx.unique-names=true

# ==================== BASE DE DATOS ====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always

# Pool optimizado (MUY importante para imports grandes)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# 🔥 CLAVE PARA BULK INSERTS
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# ==================== MULTIPART (IMPORTS GRANDES) ====================
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.file-size-threshold=2MB

# ==================== SERVIDOR ====================
# En Railway el puerto se asigna dinámicamente mediante la variable PORT
server.port=${PORT:${SERVER_PORT:8080}}
server.forward-headers-strategy=native

# ==================== CACHE ====================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=1800s

# ==================== SCHEDULING ====================
spring.task.scheduling.pool.size=2

# ==================== TPV SECURITY ====================
tpv.security.token=${TPV_TOKEN:TPV-SECRET-STATIC-TOKEN-12345}

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.proconsi=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.security=DEBUG

# ==================== MAIL (Managed via DB in EmailServiceImpl) ====================
# Settings like host, port, username, and password are now dynamic and managed through the TPV configuration panel.
# Default values or environment variables can still be set in application-local.properties if needed.

JAVA_OPTS=-Xmx256m -Xms128m
# ==================== DEEPL TRANSLATION (Disabled until API Key is provided) ====================
# deepl.api.key=${DEEPL_API_KEY:your_deepl_api_key_here}
# ==================== BACKUPS ====================
# Carpeta local para guardar los backups (.gz)
backup.local.path=C:/TPV/backups/
# Ruta al ejecutable de mysqldump (si no está en el PATH)
mysqldump.path=mysqldump
backup.enabled=true

# ==================== VERIFACTU (defaults) ====================
verifactu.enabled=false
verifactu.environment=pruebas
verifactu.software.version=1.0.0
verifactu.software.id-sistema=EB
verifactu.software.numero-instalacion=1
verifactu.retry.max-attempts=5
verifactu.retry.delay-ms=600000