spring.application.name=electrobazar

# ==================== ENCODING ====================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8

# ==================== BASE DE DATOS ====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/electrobazar?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Europe/Madrid}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== SERVIDOR ====================
server.port=${SERVER_PORT:8081}

# ==================== THYMELEAF ====================
spring.thymeleaf.cache=false

# ==================== ADMIN ====================
admin.pin=${ADMIN_PIN:1234}