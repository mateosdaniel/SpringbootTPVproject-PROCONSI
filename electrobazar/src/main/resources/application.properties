# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== SQL INIT ====================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==================== SERVIDOR ====================
server.port=${SERVER_PORT:8080}

# ==================== THYMELEAF ====================
spring.thymeleaf.cache=false

# ==================== ADMIN ====================
admin.pin=${ADMIN_PIN}

# ==================== CACHE ====================
# Using Caffeine for in-memory caching with TTL support
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m
# Cache names used in the application
spring.cache.cache-names=productPrices

# ==================== SCHEDULING ====================
# Timezone for @Scheduled cron expressions (matches the application timezone)
spring.task.scheduling.pool.size=2