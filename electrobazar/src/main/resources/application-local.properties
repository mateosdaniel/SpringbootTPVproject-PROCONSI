# Database Configuration (LOCAL - XAMPP)
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/electrobazar?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true


# Server
server.port=8080

# Mail
spring.mail.username=danielmateos684@gmail.com
spring.mail.password=

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=1800s

# ==================== VERIFACTU ====================
# Poner enabled=true cuando tengas el certificado
verifactu.enabled=true
verifactu.environment=pruebas

# Cuando recibas el certificado .p12, descomenta y rellena:
verifactu.certificate.path=C:/Users/PracticasSoftware2/Downloads/certificados/99999910G_prueba.pfx
verifactu.certificate.password=1234

# Identificación del software (se rellena automáticamente con CompanySettings)
verifactu.software.version=1.0.0
verifactu.software.id-sistema=EB
verifactu.software.numero-instalacion=1

# Reintentos automáticos
# Delay entre ticks del scheduler (10s en dev; subir a 600000 en produccion)
verifactu.retry.delay-ms=100000
verifactu.qr-base-url=https://prewww2.aeat.es/wlpl/TIKE-CONT/ValidarQR

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.com.proconsi=DEBUG
# Forzar INFO en el scheduler para que @PostConstruct y ticks siempre sean visibles
logging.level.com.proconsi.electrobazar.scheduler=INFO
logging.level.org.hibernate=INFO
logging.level.org.springframework=INFO
# Reduce security filter spam (cooldown endpoint polling every 1s)
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.web.FilterChainProxy=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN

# ==================== UPLOADS ====================
app.upload.dir=./uploads


